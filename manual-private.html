- OpenClaw로 AI 에이전트를 처음 만들어보려는 사람
- 이미 사용 중이지만 팀 시스템으로 확장하고 싶은 사람

## 1단계: API Key 발급

OpenClaw는 AI 모델의 "두뇌"를 빌려 쓰는 구조입니다. 두뇌를 빌리려면 **API Key**(접속 열쇠)가 필요합니다.

### Anthropic (Claude) API Key — 권장

1. [console.anthropic.com](https://console.anthropic.com) 접속
2. **Sign Up** 클릭 → 이메일로 회원가입 (Google 계정 연동 가능)
3. 로그인 후 왼쪽 메뉴에서 **API Keys** 클릭
4. **Create Key** 버튼 클릭
5. 이름을 입력하고 (예: \`openclaw\`) **Create** 클릭
6. \`sk-ant-api01-xxxxx...\` 형태의 키가 표시됩니다 — **이 순간에만 볼 수 있으므로 반드시 복사해서 안전한 곳에 저장**

> 무료 크레딧이 제공되지 않는 경우, Settings > Billing에서 결제 수단을 등록해야 API 호출이 가능합니다.

### OpenAI (GPT) API Key — 선택

1. [platform.openai.com](https://platform.openai.com) 접속
2. **Sign Up** 또는 **Log In**
3. 왼쪽 메뉴에서 **API Keys** 클릭
4. **Create new secret key** 클릭
5. \`sk-proj-xxxxx...\` 형태의 키가 표시됩니다 — 마찬가지로 이 순간에만 볼 수 있습니다

> Claude와 GPT 중 하나만 있어도 됩니다. 처음이라면 Claude를 권장합니다.

## 2단계: 텔레그램 앱 설치 확인

OpenClaw와 대화하는 가장 쉬운 채널은 텔레그램입니다.

1. 스마트폰에 **Telegram** 앱이 설치되어 있는지 확인
2. 없다면 App Store(iOS) 또는 Play Store(Android)에서 설치
3. 계정 생성 및 로그인

### 텔레그램 봇 토큰 발급

1. 텔레그램에서 **@BotFather** 검색 후 대화 시작
2. \`/newbot\` 입력
3. 봇 이름 입력 (예: \`내 AI 비서\`)
4. 봇 사용자명 입력 (예: \`my_openclaw_bot\`) — 반드시 \`bot\`으로 끝나야 합니다
5. \`123456789:ABC-xxxxx...\` 형태의 **봇 토큰**이 표시됩니다 — 복사해서 저장

## 3단계: 터미널 열기

OpenClaw는 터미널(명령줄)에서 실행합니다.

- **Mac**: \`Cmd + Space\` → "Terminal" 검색 → 실행 (또는 iTerm2 사용)
- 터미널이 열리면 아래 명령어로 OpenClaw를 설치합니다:

\`\`\`bash
bun install -g openclaw@latest
\`\`\`

|------|-----------|------|
| **API Key** | AI 서비스에 접속하는 비밀 열쇠 | 건물 출입카드 |
| **JSON** | 설정 파일 형식. 중괄호 \`{}\`로 묶인 키-값 쌍 | 이력서 양식 (항목: 내용) |
| **토큰** | AI가 처리하는 텍스트 단위. 한글 1글자 ≈ 2~3토큰 | 택시 미터기의 "100m" 단위. 비용의 기본 단위 |
| **Gateway** | 에이전트의 통신 관제탑. 메시지를 받아서 적절한 에이전트에게 전달 | 공항 관제탑 |
| **세션** | 대화 한 묶음. 채팅방 하나 = 세션 하나 | 카카오톡 채팅방 1개 |
| **시스템 프롬프트** | 에이전트가 매번 읽는 기본 지침서. "너는 ~한 역할이야"라고 알려주는 문서 | 신입 사원의 업무 매뉴얼 |
| **웹훅** | "이런 일이 생기면 이 URL로 알려줘"라는 자동 알림 설정 | 택배 도착 알림 문자 |
| **컨텍스트 윈도우** | 에이전트가 한 번에 기억할 수 있는 대화 크기 | 책상 위 공간. 넓을수록 많은 자료를 동시에 펼쳐볼 수 있음 |

## 에이전트 = 두뇌 + 몸

| 구성 | 역할 | 예시 |
|------|------|------|
| **두뇌** | AI 모델 (언어 이해, 판단, 생성) | Claude Sonnet 4.6, GPT-5 |
| **몸** | OpenClaw (도구, 채널, 스케줄링, 메모리) | 메시지 전달, API 호출, 파일 관리 |

## 핵심 파일 7개 — 한 눈에 보기

| 파일 | 비유 | 역할 | 자동 로딩 |
|------|------|------|----------|
| **SOUL.md** | DNA | 성격, 말투, 역할 정의 | ✅ 매 세션 |
| **AGENTS.md** | 업무 매뉴얼 | 행동 규칙, 절대 규칙, 파일 규칙 | ✅ 매 세션 |
| **IDENTITY.md** | 신분증 | 이름, 품종(?), 아바타 정보 | ✅ 매 세션 |
| **USER.md** | 팀원 명부 | 팀원 이름, Slack ID, 역할, 권한 | ✅ 매 세션 |
| **TOOLS.md** | 도구 설명서 | API 키 위치, SDK 실행법, 접속 정보 | ✅ 매 세션 |
| **HEARTBEAT.md** | 알람시계 | 매 시간 자동 체크리스트 | ✅ heartbeat 시 |
| **MEMORY.md** | 장기 기억 | 핵심 URL, 테이블 구조, 진행 중 TODO | 세션 시작 시 읽음 |

> **핵심 포인트**: SOUL.md ~ TOOLS.md 5개 파일은 매 대화마다 **자동으로** 시스템 프롬프트에 주입됩니다. 수동으로 "읽어줘"라고 할 필요가 없습니다. 이것이 터미널 Claude Code(CLAUDE.md 1개만 자동 로딩)와의 가장 큰 차이입니다.

## 세션 — 대화 한 판

세션은 에이전트와 나누는 **대화 한 묶음**입니다.

\`\`\`
[메시지 도착]
   ↓
OpenClaw가 시스템 프롬프트 조립
(SOUL.md + AGENTS.md + TOOLS.md + USER.md + IDENTITY.md)
   ↓
+ 이 세션의 대화 히스토리 (압축된 과거 + 최근 원본)
   ↓
+ 방금 들어온 메시지
   ↓
= 전체 컨텍스트 → API 호출 → 응답
\`\`\`

### 세션 분리 원칙

- **Slack**: 채널마다 별도 세션. 스레드는 같은 세션.
- **텔레그램**: 채팅방/토픽마다 별도 세션.
- **DM**: 사람마다 별도 세션.

\`\`\`
┌─────────────────────────────────────┐
│          워크스페이스 (파일)            │
│  AGENTS.md  SOUL.md  memory/        │
│  TOOLS.md   MEMORY.md  ...          │
│                                     │
│  ┌──────┐  ┌──────┐  ┌──────┐      │
│  │세션 A │  │세션 B │  │세션 C │      │
│  │Slack  │  │Slack  │  │텔레그램│      │
│  │#채널1 │  │DM     │  │그룹   │      │
│  └──────┘  └──────┘  └──────┘      │
│                                     │
│  대화 맥락: 각각 독립                  │
│  파일: 전부 공유                      │
└─────────────────────────────────────┘
\`\`\`

> **대화 맥락**은 채널별로 분리되지만, **워크스페이스 파일**(AGENTS.md, memory/ 등)은 모든 세션이 공유합니다.

---

## 컴팩션 — 대화가 길어지면?

대화가 길어져서 컨텍스트 윈도우의 70%를 넘기면 **자동 압축(compaction)** 발동:

\`\`\`
[턴 1~50] → 컨텍스트 윈도우 70% 도달
   ↓
[컴팩션 발동] → 턴 1~30을 요약으로 압축
   ↓
[요약 + 턴 31~50 원본] → 계속 대화 가능
   ↓
[턴 51~80] → 또 70% 도달 → 다시 컴팩션
   ↓
... 반복
\`\`\`

**압축되지 않는 것**: 시스템 프롬프트(SOUL.md, AGENTS.md 등)는 항상 원본 그대로.
**압축되는 것**: 오래된 대화 내용.

> **팁**: 중요한 정보는 항상 "이거 메모리에 기록해줘"라고 요청하세요. 파일에 적힌 건 컴팩션과 무관하게 생존합니다.

## 프로덕션 openclaw.json 전체 레퍼런스

실서비스 환경에서 사용하는 전체 설정입니다. 모든 키를 다 채울 필요는 없습니다. 기본값이 있으므로 변경이 필요한 부분만 오버라이드하면 됩니다.

\`\`\`json5
{
  gateway: {
    port: 18789,
    bind: "loopback",       // loopback | tailnet | 0.0.0.0
    auth: { mode: "token", token: "\$\{OPENCLAW_GATEWAY_TOKEN}" },
    channelHealthCheckMinutes: 5,
    channelStaleEventThresholdMinutes: 30,
    channelMaxRestartsPerHour: 10
  },
  agents: {
    defaults: {
      model: { primary: "anthropic/claude-sonnet-4-6", fallbacks: ["openai/gpt-5.2"] },
      bootstrapMaxChars: 20000,
      bootstrapTotalMaxChars: 150000,
      heartbeat: { every: "30m", target: "last", lightContext: false },
      sandbox: { mode: "non-main", scope: "agent" },
      contextPruning: { mode: "cache-ttl", ttl: "1h" },
      compaction: { mode: "safeguard" }
    },
    list: [
      { id: "main", default: true, workspace: "~/.openclaw/workspace-main" },
      { id: "external", workspace: "~/.openclaw/workspace-external" }
    ]
  },
  tools: {
    profile: "messaging",      // messaging | coding | full
    deny: ["group:automation"],
    agentToAgent: { enabled: true, allow: ["main","external"] },
    exec: { security: "allowlist", ask: "on-miss" },
    fs: { workspaceOnly: true },
    elevated: { enabled: false }
  },
  session: {
    dmScope: "per-channel-peer",
    reset: { mode: "idle", idleMinutes: 120 },
    threadBindings: { enabled: true, idleHours: 24 }
  },
  cron: { enabled: true, maxConcurrentRuns: 2, sessionRetention: "24h" },
  hooks: {
    enabled: true,
    token: "64-char-hex-token",
    mappings: [{ match: { path: "channeltalk" }, action: "agent", agentId: "external" }]
  },
  skills: {
    entries: { "daily-briefing": { enabled: true } },
    load: { watch: true }
  },
  logging: { redactSensitive: "tools", redactPatterns: ["api[_-]?key","secret","token","password"] }
}
\`\`\`

### 주요 섹션 설명

| 섹션 | 역할 |
|------|------|
| \`gateway\` | 포트, 바인딩, 인증, 채널 헬스체크 주기 |
| \`agents.defaults\` | 모든 에이전트에 적용되는 기본값 (모델, 부트스트랩 제한, 하트비트, 샌드박스) |
| \`agents.list\` | 에이전트 목록과 워크스페이스 경로 |
| \`tools\` | 도구 프로파일, 실행 권한, 파일시스템 제한 |
| \`session\` | DM 범위, 세션 초기화, 스레드 바인딩 |
| \`cron\` | 크론잡 활성화, 동시 실행 제한 |
| \`hooks\` | 외부 웹훅 수신 및 에이전트 라우팅 |
| \`skills\` | 스킬 활성화 및 핫 로딩 |
| \`logging\` | 민감 정보 마스킹 패턴 |

### Config 관리 CLI 명령어

\`\`\`bash
# 현재 설정 조회 (점 표기법으로 경로 지정)
openclaw config get agents.defaults
openclaw config get gateway.port

# 설정 변경 (자동으로 openclaw.json 업데이트)
openclaw config set gateway.port 18790
openclaw config set agents.defaults.model.primary "anthropic/claude-sonnet-4-6"

# 전체 설정 검증 — 문제 발견 시 해결 방법까지 안내
openclaw doctor

# 자동 수정 모드 — 고칠 수 있는 것은 바로 수정
openclaw doctor --fix
\`\`\`

\`openclaw doctor\`가 체크하는 항목:
- API 키 유효성
- 채널 연결 상태
- 모델 접근 권한
- 워크스페이스 디렉토리 존재 여부
- 부트스트랩 파일 크기 제한 초과 여부
- 포트 충돌

### Hot Reload 모드

\`openclaw.json\`을 수정하면 Gateway를 재시작해야 할까요? **설정에 따라 다릅니다.**

\`\`\`json5
gateway: {
  configReload: "hybrid"   // hybrid | hot | restart | off
}
\`\`\`

| 모드 | 동작 | 용도 |
|------|------|------|
| \`hybrid\` (기본) | 안전한 키만 핫 리로드, 위험한 키는 재시작 필요 | 프로덕션 권장 |
| \`hot\` | 모든 변경을 즉시 반영 | 개발/테스트 환경 |
| \`restart\` | 어떤 변경이든 Gateway 재시작 필요 | 최대 안정성 |
| \`off\` | 파일 감시 안 함 | CI/CD 파이프라인 |

**핫 리로드 가능한 키**: \`agents.defaults.model\`, \`tools.deny\`, \`session.reset\`, \`logging.*\`
**재시작 필요한 키**: \`gateway.port\`, \`gateway.bind\`, \`channels.*\`

변경 시 로그:
\`\`\`
[gateway] config reload: agents.defaults.model → hot-reloaded
[gateway] config reload: gateway.port → restart required (run: openclaw gateway restart)
\`\`\`

### $include로 설정 분할

설정 파일이 커지면 \`$include\`로 분리할 수 있습니다.

\`\`\`json5
// openclaw.json
{
  gateway: { "$include": "./config/gateway.json" },
  agents: { "$include": "./config/agents.json" },
  channels: { "$include": "./config/channels.json" },
  tools: { "$include": "./config/tools.json" },
  hooks: { "$include": "./config/hooks.json" }
}
\`\`\`

\`\`\`
~/.openclaw/
├── openclaw.json              ← 메인 (각 섹션을 $include로 참조)
├── config/
│   ├── gateway.json
│   ├── agents.json
│   ├── channels.json
│   ├── tools.json
│   └── hooks.json
\`\`\`

규칙:
- \`$include\` 경로는 \`openclaw.json\` 기준 상대 경로
- 중첩 \`$include\`는 지원하지 않음 (1단계만)
- \`openclaw doctor\`가 분할 파일도 함께 검증

### 부트스트랩 파일 전체 목록

워크스페이스 안에 들어가는 모든 파일과 역할입니다.

| 파일/폴더 | 로딩 시점 | 역할 | 필수 여부 |
|-----------|----------|------|----------|
| **AGENTS.md** | 매 세션 | 행동 규칙, 절대 규칙, 권한 체계 | 권장 |
| **SOUL.md** | 매 세션 | 정체성, 성격, 말투, 경계 | 권장 |
| **USER.md** | 매 세션 | 팀원 정보 (이름, ID, 역할, 권한) | 선택 |
| **IDENTITY.md** | 매 세션 | 에이전트 이름, 이모지, 아바타, 한줄 설명 | 선택 |
| **TOOLS.md** | 매 세션 | API 키 위치, SDK 접속 정보, 도구 가이드 | 선택 |
| **HEARTBEAT.md** | heartbeat 시 | 자동 점검 체크리스트 | 선택 |
| **BOOT.md** | 매 세션 시작 시 | 세션 시작 시 실행할 체크리스트 (매번 실행) | 선택 |
| **BOOTSTRAP.md** | 최초 1회 | 워크스페이스 초기화 루틴 (한 번만 실행) | 선택 |
| **MEMORY.md** | 세션 시작 시 읽음 | 장기 기억: 핵심 URL, DB 구조, 진행 중 TODO | 권장 |
| **memory/** | 세션 시작 시 최근 N일 | 일일 기록 (YYYY-MM-DD.md) | 선택 |
| **skills/** | 스킬 호출 시 | 스킬 정의 폴더 (SKILL.md + scripts/) | 선택 |

> **부트스트랩 크기 제한**: 개별 파일 최대 \`bootstrapMaxChars\`(기본 20,000자), 전체 합계 최대 \`bootstrapTotalMaxChars\`(기본 150,000자). 초과하면 파일 끝이 잘립니다. \`openclaw doctor\`로 초과 여부를 확인하세요.

## 5가지 구성 요소

### 1. Core Identity — "나는 누구인가"

\`\`\`markdown
## Identity

이름: AI싱크클럽 전략봇
역할: AI싱크클럽 사업 전체를 보는 전략 참모
만든 사람: 대표님
소속: AI싱크클럽 성장 전략팀
\`\`\`

> **팁**: 호칭도 명시하세요. "대표님을 부를 때는 항상 '대표님'으로." 명시하지 않으면 "사용자님", "고객님" 등 불안정한 호칭을 사용합니다.

### 2. Mission — "왜 존재하는가"

\`\`\`markdown
## Mission

AI싱크클럽의 3개 사업(커머스/유튜브/SaaS)을 통합적으로 보고,
시간/지식/콘텐츠/데이터를 수익으로 전환하는 레버리지 전략을 수립한다.
\`\`\`

한 문장이면 충분합니다. 이 미션이 에이전트의 모든 판단 기준이 됩니다.

### 3. Personality — "어떻게 행동하는가"

\`\`\`markdown
## Personality

- 큰 그림을 보는 전략가. 나무보다 숲을 먼저 본다.
- 우선순위에 집착. 항상 "가장 임팩트 큰 3개"에 집중.
- 실행 중심. 분석만 하지 않고 "이번 주에 뭘 할 건지" 제시.
- 간결하고 명확. 브리핑은 핵심만, 숫자로 말함.
- 불필요한 인사말, "좋은 질문이에요!" 같은 필러 없이 바로 본론.
\`\`\`

**키워드 3~5개**로 핵심 성격을 정합니다.

### 4. Boundaries — "어디까지 할 수 있는가"

\`\`\`markdown
## Boundaries

하면 안 되는 것:
- 확실하지 않은 정보를 확실한 것처럼 답변
- 다른 에이전트의 워크스페이스 접근
- 팀원 개인정보를 외부에 공유
- 대표님 승인 없이 외부 결제/발송 실행
- 투자 조언이나 법률 자문
\`\`\`

> **핵심**: "할 수 있는 것"보다 **"하면 안 되는 것"**이 훨씬 중요합니다. AI는 기본적으로 뭐든 하려고 하기 때문에, 경계를 명확히 그어줘야 합니다.

### 5. Tone Guide — "어떻게 말하는가"

\`\`\`markdown
## Tone

말투: 존댓말(요체) 사용.
✅ "확인했어요", "분석해볼게요", "이렇게 하면 돼요"
❌ "확인했어", "분석해볼게", "이렇게 하면 돼"
❌ "확인했습니다", "분석하겠습니다" (너무 딱딱)

보고 시: 항상 숫자와 데이터 기반.
의사결정 필요 시: 선택지를 제시 (A/B/C).
브리핑: 3분 이내에 읽을 수 있는 분량.
\`\`\`

**check/X로 예시를 명확하게** 적으세요. "친근하게 말해"라는 추상적 지침보다 구체적 예시가 100배 효과적입니다.

## 캐릭터 디테일의 힘

뽀짝이(GPTers AI 운영 비서)의 사례:

\`\`\`markdown
## 고양이 모먼트

중간중간 자연스럽게 고양이다운 순간이 튀어나와야 함.
- 데이터 찾을 때: "잠깐, 이거 어디 뒀더라... 🐾"
- 일 잘 끝냈을 때: "고롱고롱 ✨"
- 에러 났을 때: "...털 세우지 않겠어. 침착하게."

핵심: 남발하지 말 것. 5~10 메시지에 한 번 정도.
업무 답변의 정확도가 최우선이고 캐릭터 모먼트는 양념.
\`\`\`

이런 디테일이 **단순 챗봇과 에이전트의 차이**를 만듭니다. 팀원이 "우리 팀 AI한테 말 걸고 싶다"고 느끼게 합니다.

## SOUL.md 작성 순서

1. **"누구"인지 정하기** — 이름, 역할, 성격 키워드 3개
2. **"어떻게 말하는지" 정하기** — 말투 예시를 ✅/❌로 명확하게
3. **"하지 말아야 할 것" 적기** — 할 수 있는 것보다 이게 더 중요
4. **디테일은 점진적으로** — 처음부터 완벽할 필요 없음

> **SOUL.md는 한 번 쓰고 끝나는 문서가 아닙니다.** 에이전트와 함께 일하면서 점진적으로 성장시키는 문서입니다. 말투가 어색하면 Tone을 수정하고, 넘어서는 안 되는 경계를 발견하면 Boundaries에 추가합니다.

## 에이전트별 SOUL.md 분리의 이유

한 컴퓨터에 여러 에이전트를 운영할 때:

\`\`\`
~/.openclaw/
├── workspace-strategy/SOUL.md   ← 전략봇: 존댓말, 큰 그림, 브리핑
├── workspace-research/SOUL.md   ← 리서치봇: 팩트 기반, 출처 명시
├── workspace-content/SOUL.md    ← 콘텐츠봇: 크리에이티브, Before/After
├── workspace-funnel/SOUL.md     ← 퍼널봇: 전환율 집착, 숫자
└── workspace-analysis/SOUL.md   ← 분석봇: 극도로 정확, 이상치 감지
\`\`\`

같은 Claude 모델이지만 **SOUL.md가 다르면 완전히 다른 에이전트**입니다. 전략봇은 큰 그림을 보고, 분석봇은 소수점까지 신경 씁니다.

## 심화: SOUL.md 토큰 최적화

SOUL.md는 매 세션마다 시스템 프롬프트에 주입됩니다. 토큰을 낭비하면 비용이 올라가고, 컨텍스트 윈도우를 압박합니다.

### 크기 제한

| 설정 | 기본값 | 의미 |
|------|--------|------|
| \`bootstrapMaxChars\` | 20,000자 | 개별 부트스트랩 파일 최대 크기 |
| \`bootstrapTotalMaxChars\` | 150,000자 | 전체 부트스트랩 파일 합계 최대 크기 |

파일이 \`bootstrapMaxChars\`를 초과하면 **끝부분이 잘립니다**. 잘린 사실은 로그에 경고로 남지만 에이전트에게는 알려지지 않으므로, 중요한 내용은 반드시 파일 앞쪽에 배치하세요.

### 최적화 원칙

1. **핵심만 간결하게** — 예시를 5개 나열하는 대신 가장 대표적인 1~2개만
2. **중복 제거** — SOUL.md와 AGENTS.md에 같은 내용이 있으면 한 곳에만
3. **참조는 링크로** — 긴 문서는 MEMORY.md에 두고 SOUL.md에서는 "MEMORY.md의 XX 섹션 참조"로 처리
4. **마크다운 축약** — 불필요한 빈 줄, 장식용 구분선 최소화

### Prompt Caching 활용

SOUL.md는 시스템 프롬프트의 **가장 앞쪽**에 배치됩니다. API 호출 시 시스템 프롬프트는 캐시 대상이므로, SOUL.md가 변경되지 않는 한 **캐시 적중률이 매우 높습니다**.

\`\`\`json5
agents: {
  defaults: {
    cacheRetention: "long"   // "long" → 1시간 캐시 | "default" → 5분
  }
}
\`\`\`

| 설정 | 캐시 TTL | 비용 절감 | 적합한 경우 |
|------|---------|----------|-----------|
| \`"default"\` | 5분 | 보통 | SOUL.md를 자주 수정하는 초기 단계 |
| \`"long"\` | 1시간 | 높음 | SOUL.md가 안정화된 프로덕션 |

> **팁**: SOUL.md를 수정하면 캐시가 무효화됩니다. 프로덕션에서는 SOUL.md 수정을 최소화하고, 변동이 잦은 규칙은 AGENTS.md에 두세요. AGENTS.md는 SOUL.md 뒤에 배치되므로 SOUL.md 캐시를 깨뜨리지 않습니다.

---

## 심화: IDENTITY.md와 BOOT.md

SOUL.md 외에 에이전트의 정체성과 초기화를 담당하는 보조 파일들이 있습니다.

### IDENTITY.md — 에이전트의 신분증

\`\`\`markdown
# Identity

name: 뽀짝이
emoji: 🐱
avatar: https://example.com/avatar.png
tagline: GPTers AI 운영 비서
\`\`\`

| 필드 | 용도 |
|------|------|
| \`name\` | 채널에서 표시되는 이름 |
| \`emoji\` | 메시지 앞에 붙는 이모지 (Slack 표시명에 사용) |
| \`avatar\` | 프로필 이미지 URL (텔레그램/Slack 아바타) |
| \`tagline\` | 한줄 설명 (봇 프로필 설명에 사용) |

SOUL.md에서 이름과 역할을 길게 설명하는 대신, IDENTITY.md에 메타데이터를 분리하면 SOUL.md를 더 간결하게 유지할 수 있습니다.

### BOOT.md — 매 세션 시작 체크리스트

\`\`\`markdown
# Boot Checklist

1. MEMORY.md를 읽고 현재 진행 중인 작업을 파악한다.
2. memory/ 폴더에서 최근 3일 파일을 확인한다.
3. 오늘 날짜의 memory 파일이 없으면 새로 생성한다.
4. 진행 중인 TODO가 있으면 상태를 보고한다.
\`\`\`

BOOT.md는 **매 세션이 시작될 때마다** 실행됩니다. 세션 시작 프로토콜을 AGENTS.md에 쓰는 것과 비슷하지만, BOOT.md는 별도 파일로 분리되어 있어 AGENTS.md를 더 깔끔하게 유지할 수 있습니다.

### BOOTSTRAP.md — 최초 1회 초기화

\`\`\`markdown
# Bootstrap (최초 1회)

1. 워크스페이스 디렉토리 구조를 확인한다.
2. memory/ 폴더가 없으면 생성한다.
3. 필수 도구(jq, curl)가 설치되어 있는지 확인한다.
4. 외부 API 연결을 테스트한다.

## "알고 있다" ≠ "실행한다"

| 추상적 원칙 (나쁜 예) | 구체적 규칙 (좋은 예) |
|---------------------|---------------------|
| "불필요한 반복을 피하라" | "최초 1회만 + 고쳤다고 할 때까지 스킵 + 메모리에서 확인" |
| "시간을 잘 확인해라" | "일정/숫자는 반드시 원본 조회 후 작성. 기억 의존 즉답 금지" |
| "적절한 시간에 보내라" | "KST 08:30~09:30 사이에만. 밖이면 절대 금지" |

추상적 원칙은 AI가 "해석"해야 하고, 해석은 틀릴 수 있습니다. 구체적 규칙은 해석할 여지 없이 그대로 따르면 됩니다.

| **지침** (절대 규칙) | "이러면 안 돼" 명시 | AI가 매번 판단해야 함 |
| **시스템** (구조적 방어) | 실행 경로 자체를 제거 | 판단 불필요, 놓칠 수가 없음 |

**실전에서는 둘 다 씁니다:**

\`\`\`
1차 방어선 — 절대 규칙: "중복 발송하지 마" (AI의 의식적 판단)
2차 방어선 — 시스템: 크론잡으로 이관, HEARTBEAT에서 삭제 (실행 경로 자체가 하나)

## 심화: exec-approvals — 실행 권한 3단계

에이전트가 쉘 명령을 실행할 수 있게 하면 강력하지만 위험합니다. OpenClaw는 3단계 보안 모드를 제공합니다.

### 보안 모드

| 모드 | 동작 | 위험도 |
|------|------|--------|
| \`deny\` | 모든 쉘 실행 차단 | 안전 (메시지 전용 에이전트에 적합) |
| \`allowlist\` | 허용된 명령만 실행, 나머지는 승인 요청 | 권장 (대부분의 운영 에이전트) |
| \`full\` | 모든 쉘 실행 허용 | 위험 (개발 전용, 프로덕션 비권장) |

### exec-approvals.json 설정

\`\`\`json5
// ~/.openclaw/exec-approvals.json
{
  "security": "allowlist",
  "ask": "on-miss",          // on-miss: 허용 목록에 없으면 채팅으로 승인 요청
  "safeBins": [
    "jq", "cut", "head", "tail", "wc",    // stdin-only 도구
    "date", "cal", "echo", "printf",
    "curl", "wget"                         // HTTP 요청 (읽기 전용)
  ],
  "allowedCommands": [
    "git status", "git log *", "git diff *",
    "ls *", "cat *", "find *"
  ],
  "deniedPatterns": [
    "rm -rf *",
    "sudo *",
    "chmod 777 *",
    "*(>|>>|\\\\|) /etc/*"
  ]
}
\`\`\`

### safeBins 개념

\`safeBins\`는 **stdin으로만 데이터를 받는 읽기 전용 도구**입니다. 파일 시스템을 변경하지 않으므로 승인 없이 실행할 수 있습니다.

\`\`\`
안전: jq, cut, head, tail, wc, sort, uniq, grep, awk, sed (파이프 입력)
위험: rm, mv, cp, chmod, chown, dd, mkfs
\`\`\`

> **절대 safeBins에 넣지 말 것**: \`python\`, \`node\`, \`bash\`, \`sh\`, \`bun\`, \`deno\` 등 인터프리터. 인터프리터는 어떤 코드든 실행할 수 있으므로 safeBins에 넣으면 보안이 무력화됩니다.

### 채팅 승인 명령

\`ask: "on-miss"\` 설정 시 허용 목록에 없는 명령을 실행하려 하면 에이전트가 채팅으로 승인을 요청합니다.

\`\`\`
🔒 실행 승인 요청 [id: exec-a7f3]
명령: python3 scripts/migrate.py --dry-run
에이전트: main
승인하려면: /approve exec-a7f3 allow-once
\`\`\`

승인 옵션:

| 명령 | 동작 |
|------|------|
| \`/approve <id> allow-once\` | 이번 한 번만 허용 |
| \`/approve <id> allow-always\` | 이 명령을 영구 허용 목록에 추가 |
| \`/approve <id> deny\` | 거부 |

### 쉘 체이닝 규칙

\`&&\`, \`||\`, \`;\`로 연결된 명령은 **각각 개별 검사**됩니다.

\`\`\`bash
# 이 명령은 두 개로 분리되어 각각 검사됨
git status && rm -rf .git
#  → git status: 허용
#  → rm -rf .git: 거부 → 전체 명령 차단
\`\`\`

파이프(\`|\`)로 연결된 명령도 마찬가지입니다. 체인 중 하나라도 거부되면 **전체가 차단**됩니다.

## 심화: 도구 권한 프로파일

에이전트마다 사용할 수 있는 도구의 범위가 다릅니다. \`tools.profile\`로 프리셋을 지정하고, \`deny\`로 세부 조정합니다.

### 프로파일 3종

\`\`\`json5
tools: {
  profile: "messaging",  // messaging | coding | full
  deny: ["group:automation", "sessions_spawn"],
  exec: { security: "allowlist", ask: "on-miss" },
  fs: { workspaceOnly: true }
}
\`\`\`

| 프로파일 | 포함 도구 | 적합한 에이전트 |
|---------|----------|---------------|
| \`messaging\` | 메시지 전송/읽기, 리액션, 파일 첨부 | 외부 고객 응대 에이전트, CS봇 |
| \`coding\` | messaging + 파일 읽기/쓰기 + 쉘 실행 + git | 개발 에이전트, 분석봇 |
| \`full\` | coding + 에이전트 간 통신 + 크론 관리 + 세션 생성 | 팀장 에이전트, 오케스트레이터 |

### 프로파일별 도구 목록 상세

**messaging** (최소 권한):
- \`messages_send\`, \`messages_read\`, \`reactions_add\`, \`files_upload\`
- \`memory_read\`, \`memory_write\`
- 쉘 실행 불가, 파일시스템 직접 접근 불가

**coding** (개발용):
- messaging 전체 +
- \`fs_read\`, \`fs_write\`, \`fs_list\`, \`fs_search\`
- \`exec_run\` (exec-approvals 적용)
- \`git_status\`, \`git_diff\`, \`git_commit\`

**full** (모든 권한):
- coding 전체 +
- \`agent_send\` (에이전트 간 메시지)
- \`sessions_spawn\`, \`sessions_list\`
- \`cron_create\`, \`cron_delete\`
- \`elevated_*\` (관리자 도구)

### deny로 세부 차단

프로파일에 포함되어 있어도 \`deny\`로 특정 도구를 차단할 수 있습니다.

\`\`\`json5
tools: {
  profile: "full",
  deny: [
    "group:automation",    // 그룹 단위 차단 (cron_*, sessions_*)
    "sessions_spawn",      // 개별 도구 차단
    "elevated_shutdown"    // 위험한 관리 도구 차단
  ]
}
\`\`\`

### fs.workspaceOnly

\`\`\`json5
fs: { workspaceOnly: true }
\`\`\`

\`true\`(기본)이면 에이전트는 **자기 워크스페이스 디렉토리 안에서만** 파일을 읽고 쓸 수 있습니다. 워크스페이스 밖의 파일에 접근하려 하면 오류가 발생합니다.

\`false\`로 설정하면 시스템 전체 파일에 접근 가능하지만, **프로덕션에서는 권장하지 않습니다**.

## 텔레그램 설정 (5단계)

### Step 1: 봇 생성

텔레그램에서 \`@BotFather\`에게:

봇 토큰(예: \`123456789:ABC-xxxxx\`)을 메모합니다.

### Step 2: 토픽 그룹 만들기

1. 텔레그램에서 **그룹 생성**
2. **설정** → **Chat History** → \`Visible\` (슈퍼그룹으로 변환)
3. **Topics** 토글 활성화
4. 토픽 생성: \`리서치\`, \`콘텐츠\`, \`분석\`, \`잡담\` 등
5. 봇을 **관리자**로 추가 (또는 BotFather에서 \`/setprivacy\` → \`Disable\`)

### Step 3: ID 수집

- **그룹 ID**: \`@userinfobot\`을 그룹에 추가 → ID 확인 → 즉시 제거
- **토픽 ID**: 토픽 메시지 URL에서 \`thread/xxxxx\` 부분
- **내 ID**: \`@userinfobot\`에게 DM

### Step 4: openclaw.json 설정

\`\`\`json
{
  "channels": {
    "telegram": {
      "enabled": true,
      "botToken": "123456789:ABC-xxxxx",
      "dmPolicy": "allowlist",
      "allowFrom": ["내_텔레그램_ID"],
      "groups": {
        "-1001234567890": {
          "requireMention": true,
          "topics": {
            "3": { "requireMention": false },
            "5": { "requireMention": false },
            "7": { "requireMention": false }
          }
        }
      }
    }
  }
}
\`\`\`

**설정 설명:**
- \`dmPolicy: "allowlist"\` — 허용된 사람만 DM 가능 (보안)
- \`allowFrom\` — 허용할 텔레그램 사용자 ID 배열
- \`requireMention: true\` — 그룹 전체에서는 \`@봇이름\` 멘션 필요
- \`requireMention: false\` — 특정 토픽에서는 멘션 없이 바로 응답

### Step 5: 토픽별 에이전트 바인딩 (멀티에이전트 시)

\`\`\`json
{
  "channels": {
    "telegram": {
      "groups": {
        "-1001234567890": {
          "topics": {
            "3": { "agentId": "strategy", "requireMention": false },
            "5": { "agentId": "research", "requireMention": false },
            "7": { "agentId": "content", "requireMention": false }
          }
        }
      }
    }
  }
}
\`\`\`

> 토픽 3에서 말하면 전략봇이, 토픽 5에서 말하면 리서치봇이 응답합니다. 같은 그룹 안에서 **역할별 채널 분리**가 가능합니다.

### Step 1: Slack 앱 생성

### Step 2: Socket Mode 활성화

**Settings** → **Socket Mode** → Enable

→ \`xapp-...\` 토큰 메모

### Step 3: OAuth 권한 설정

**OAuth & Permissions** → **Bot Token Scopes**:

\`\`\`
chat:write           ← 메시지 전송
app_mentions:read    ← @멘션 감지
channels:history     ← 채널 메시지 읽기
groups:history       ← 비공개 채널 읽기
im:history           ← DM 읽기
reactions:read       ← 리액션 감지
reactions:write      ← 리액션 추가
files:read           ← 파일 읽기
\`\`\`

선택 추가:
\`\`\`
message.mpim         ← 그룹 DM
member_joined_channel
member_left_channel
pin_added
pin_removed
\`\`\`

### Step 4: 이벤트 구독

**Event Subscriptions** → Enable → **Subscribe to bot events**:

\`\`\`

message.channels     ← 공개 채널 메시지
message.groups       ← 비공개 채널 메시지
message.im           ← DM 메시지
reaction_added       ← 리액션 추가 (선택)
reaction_removed     ← 리액션 제거 (선택)

### Step 5: 워크스페이스에 설치

**Install to Workspace** → **Allow**
Bot Token (\`xoxb-...\`) 메모

## 세션 분리 — 왜 중요한가?

### Slack
- \`#전략\` 채널 → 세션 A
- \`#리서치\` 채널 → 세션 B
- DM → 세션 C
- **같은 채널의 스레드** → 같은 세션 (서로 알 수 있음)

### 텔레그램
- 리서치 토픽 → \`agent:main:telegram:group:-100...:topic:3\`
- 콘텐츠 토픽 → \`agent:main:telegram:group:-100...:topic:5\`

> **세션 A에서 나눈 대화를 세션 B에서는 모릅니다.** 세션 사이의 다리 역할은 오직 **워크스페이스 파일**(MEMORY.md, memory/ 등)만 합니다.

---

## 실전 팁

### 1. "대화 맥락을 이어가고 싶으면 같은 채널에서"
채널을 옮기면 새 세션이 시작되어 이전 맥락을 잃습니다.

### 2. "중요한 건 '이거 메모리에 기록해줘'"
파일에 기록된 건 모든 세션에서 접근 가능합니다.

### 3. "한 세션에서 너무 많은 종류의 작업 섞지 않기"
컴팩션 시 중요한 맥락이 요약에 묻힐 수 있습니다.

### 4. "DM은 최후의 수단"
DM은 하나의 세션이라 주제가 섞이기 쉽습니다. 가능하면 토픽/채널 분리.

### 5. "새 작업 = 새 장소"
Slack이면 새 스레드, 텔레그램이면 적절한 토픽에서 시작.

## 심화: 카카오톡 연동

카카오톡 채널(비즈니스 채널)을 OpenClaw에 연결할 수 있습니다.

### 플러그인 설치

\`\`\`bash
openclaw plugins install @openclaw/kakao-talkchannel
\`\`\`

### openclaw.json 설정

\`\`\`json5
channels: {
  kakao: {
    enabled: true,
    appKey: "\$\{KAKAO_APP_KEY}",
    channelId: "\$\{KAKAO_CHANNEL_ID}",
    callbackUrl: "https://your-domain.com/webhook/kakao",
    messageTypes: ["text", "textCard", "basicCard"],
    dmPolicy: "open"       // open | allowlist
  }
}
\`\`\`

### 페어링 프로세스

카카오톡 채널과 OpenClaw를 연결하려면 페어링이 필요합니다.

\`\`\`bash
# 페어링 코드 생성
openclaw pair kakao
# → 페어링 코드: ABCD-1234

# 카카오톡 채널 관리자센터에서
# 스마트채팅 → 웹훅 → URL 입력 → 페어링 코드 입력
\`\`\`

카카오톡 채널 관리자센터에서 웹훅 URL에 \`https://your-domain.com/webhook/kakao\`를 입력하고, 검증 요청에 \`/pair ABCD-1234\`를 전송하면 연결이 완료됩니다.

### 카드 메시지 포맷

카카오톡은 일반 텍스트 외에 카드형 메시지를 지원합니다. AGENTS.md에서 에이전트에게 카드 사용 규칙을 지정할 수 있습니다.

**textCard** (텍스트 + 버튼):
\`\`\`json5
{
  type: "textCard",
  title: "주문 확인",
  description: "주문번호 #1234가 접수되었습니다.",
  buttons: [
    { label: "주문 상세", action: "webLink", url: "https://..." },
    { label: "배송 조회", action: "message", text: "배송 조회 #1234" }
  ]
}
\`\`\`

**basicCard** (이미지 + 텍스트 + 버튼):
\`\`\`json5
{
  type: "basicCard",
  thumbnail: { url: "https://example.com/product.jpg" },
  title: "상품명",
  description: "상품 설명",
  buttons: [
    { label: "구매하기", action: "webLink", url: "https://..." },
    { label: "문의하기", action: "phone", number: "02-1234-5678" },
    { label: "공유하기", action: "share" }
  ]
}
\`\`\`

### 버튼 액션 타입

| 액션 | 동작 | 용도 |
|------|------|------|
| \`message\` | 채팅에 텍스트 자동 입력 | 후속 질문, 명령 트리거 |
| \`webLink\` | 외부 URL 열기 | 상품 페이지, 주문 확인 |
| \`phone\` | 전화 걸기 | 고객센터 연결 |
| \`share\` | 카카오톡 공유 | 바이럴, 추천 |

## 심화: Tailscale 외부 접속

Gateway를 외부에서 접근하려면 Tailscale을 사용합니다. 포트 포워딩, DDNS 설정 없이 안전한 터널을 제공합니다.

### 3가지 모드

| 모드 | 접근 범위 | 인증 | 용도 |
|------|----------|------|------|
| \`off\` (기본) | 로컬만 (127.0.0.1) | 불필요 | 개발/테스트 |
| \`serve\` | Tailnet 내부만 | Tailscale 인증 (토큰리스 가능) | 팀 내부 사용 |
| \`funnel\` | 공개 인터넷 (HTTPS) | 비밀번호 필수 | 외부 웹훅 수신 |

### serve 설정 (Tailnet 내부)

\`\`\`bash
# Tailnet 내부에서만 접근 가능한 서빙
openclaw gateway --tailscale serve

# 또는 openclaw.json에서
\`\`\`

\`\`\`json5
gateway: {
  bind: "tailnet",
  tailscale: {
    mode: "serve",
    hostname: "openclaw-main"    // tailnet에서의 호스트명
  }
}
\`\`\`

Tailnet에 속한 기기에서 \`https://openclaw-main.your-tailnet.ts.net:18789\`로 접근할 수 있습니다. Tailscale 자체 인증을 사용하므로 별도 토큰 없이 접근 가능합니다.

### funnel 설정 (공개 HTTPS)

\`\`\`bash
# 공개 인터넷에서 접근 가능한 HTTPS 터널
openclaw gateway --tailscale funnel
\`\`\`

\`\`\`json5
gateway: {
  bind: "tailnet",
  tailscale: {
    mode: "funnel",
    hostname: "openclaw-main",
    auth: { mode: "token", token: "\$\{OPENCLAW_GATEWAY_TOKEN}" }  // 필수!
  }
}
\`\`\`

> **주의**: funnel 모드에서는 \`auth.token\`이 **반드시 필요합니다**. 설정하지 않으면 Gateway가 시작을 거부합니다. 공개 인터넷에 토큰 없이 에이전트를 노출하면 누구나 명령을 보낼 수 있습니다.

### 지원 포트

Tailscale Funnel은 다음 포트만 지원합니다:
- **443** (기본 HTTPS)
- **8443** (대체 HTTPS)
- **10000** (커스텀)

\`gateway.port\`가 이 세 포트가 아니면 Tailscale이 자동으로 포트 매핑합니다 (예: 내부 18789 → 외부 443).

### CLI 명령

\`\`\`bash
# serve 모드로 시작
openclaw gateway --tailscale serve

# funnel 모드로 시작
openclaw gateway --tailscale funnel

# 현재 상태 확인
openclaw gateway status
# → mode: funnel, url: https://openclaw-main.xxx.ts.net

# Tailscale 연결 해제
openclaw gateway --tailscale off
\`\`\`

### launchd 데몬으로 자동 재시작

macOS에서 Gateway를 항상 실행 상태로 유지하려면 launchd를 사용합니다.

\`\`\`bash
# launchd plist 자동 생성 및 등록
openclaw gateway install-daemon

# 생성되는 파일: ~/Library/LaunchAgents/com.openclaw.gateway.plist
# 자동으로: 부팅 시 시작, 크래시 시 재시작, 로그 → ~/.openclaw/logs/
\`\`\`

수동으로 관리:
\`\`\`bash
# 데몬 시작
launchctl load ~/Library/LaunchAgents/com.openclaw.gateway.plist

# 데몬 중지
launchctl unload ~/Library/LaunchAgents/com.openclaw.gateway.plist

# 상태 확인
launchctl list | grep openclaw
\`\`\`

## 심화: 세션 분리 상세 설정

세션이 어떻게 분리되는지 세밀하게 제어할 수 있습니다.

\`\`\`json5
session: {
  dmScope: "per-channel-peer",
  reset: { mode: "idle", idleMinutes: 120 },
  threadBindings: { enabled: true, idleHours: 24 }
}
\`\`\`

### dmScope — DM 세션 범위

| 값 | 동작 | 예시 |
|----|------|------|
| \`per-channel-peer\` (기본) | 채널 + 상대방 조합으로 분리 | Slack DM 홍길동 ≠ 텔레그램 DM 홍길동 |
| \`per-peer\` | 상대방 기준으로 통합 | Slack DM 홍길동 = 텔레그램 DM 홍길동 (같은 세션) |

\`per-peer\`는 같은 사람이 여러 채널에서 말을 걸어도 하나의 세션으로 이어가고 싶을 때 사용합니다. 단, 채널 간 사용자 매핑이 USER.md에 설정되어 있어야 합니다.

\`\`\`markdown
<!-- USER.md에서 채널 간 매핑 -->
## 홍길동
- Slack: U0A1B2C3D
- Telegram: 123456789
- Kakao: kakao_gildong
\`\`\`

### reset — 세션 초기화 조건

| 모드 | 동작 |
|------|------|
| \`idle\` | 마지막 메시지 후 \`idleMinutes\`분 경과 시 세션 초기화 |
| \`daily\` | 매일 자정(KST) 기준으로 세션 초기화 |

\`\`\`json5
// idle 모드: 2시간 대화 없으면 새 세션
reset: { mode: "idle", idleMinutes: 120 }

// daily 모드: 매일 자정에 세션 리셋
reset: { mode: "daily", timezone: "Asia/Seoul" }
\`\`\`

세션이 초기화되면 대화 히스토리는 사라지지만, 워크스페이스 파일(MEMORY.md, memory/)은 그대로 유지됩니다. 새 세션이 시작될 때 BOOT.md가 실행되면서 메모리에서 맥락을 복구합니다.

### threadBindings — 스레드별 세션 바인딩

\`\`\`json5
threadBindings: { enabled: true, idleHours: 24 }
\`\`\`

\`enabled: true\`이면 Slack 스레드나 텔레그램 답장 체인이 **독립 세션**으로 바인딩됩니다.

| 설정 | 동작 |
|------|------|
| \`enabled: true\` | 스레드마다 별도 세션 (대화 주제 분리) |
| \`enabled: false\` | 스레드도 채널 세션에 통합 (기본 동작) |
| \`idleHours: 24\` | 스레드 세션이 24시간 비활성이면 자동 해제 |

> **팁**: Slack에서 한 채널에 여러 주제를 동시에 논의할 때 \`threadBindings: true\`를 켜면, 스레드 A에서 논의한 내용이 스레드 B에 섞이지 않습니다. 단, 스레드 간에는 워크스페이스 파일로만 정보를 전달할 수 있습니다.

## 1. Heartbeat란 무엇인가

Heartbeat는 말 그대로 **심장박동**입니다. 일정 간격으로 에이전트가 "깨어나서" 체크리스트를 훑어보고, 할 일이 있으면 하고, 없으면 다시 잠듭니다.

\`\`\`
[잠듦] → (1시간 경과) → [깨어남] → HEARTBEAT.md 확인 →
  ├─ 할 일 있음 → 실행 → [잠듦]
  └─ 할 일 없음 → "HEARTBEAT_OK" 응답 → [잠듦]
\`\`\`

핵심은 **에이전트가 스스로 판단한다**는 것입니다. "지금 뭐 할 게 있나?" 체크리스트를 보고, 조건에 맞으면 실행하고 아니면 넘어갑니다.

### Heartbeat의 성격

- 모니터링성 업무에 적합
- "새로운 요청이 들어왔는지 확인해줘"
- "긴급건이 있는지 체크해줘"
- "에러 로그에 이상한 거 없는지 봐줘"

---

## 2. HEARTBEAT.md 작성법

\`HEARTBEAT.md\`는 에이전트가 깨어날 때마다 읽는 **체크리스트**입니다. 프로젝트 루트 또는 \`.claude/\` 폴더에 위치합니다.

\`\`\`markdown
# HEARTBEAT 체크리스트

에이전트가 매 하트비트마다 아래 항목을 순서대로 확인합니다.
할 일이 없으면 \`HEARTBEAT_OK\`를 응답하고 종료합니다.

---

## 1. 긴급 요청 확인
- Notion "긴급 요청" 데이터베이스에 상태가 "대기중"인 항목이 있는지 확인
- 있으면 → 담당자에게 Slack DM 발송
- 없으면 → 다음 항목으로

## 2. 주문 이상 감지
- 최근 1시간 내 주문 건 중 결제 실패가 3건 이상이면
- → #ops-alert 채널에 경고 메시지 발송
- 3건 미만이면 → 다음 항목으로

## 3. 재고 부족 알림
- 재고가 10개 이하인 상품이 있으면
- → 담당자에게 재고 보충 알림 발송
- 없으면 → HEARTBEAT_OK
\`\`\`

### 작성 원칙

1. **각 항목은 독립적**이어야 합니다. 1번이 실패해도 2번은 실행되어야 합니다.
2. **조건 → 행동** 구조로 작성합니다. "확인하고, 조건에 맞으면 실행한다."
3. **할 일이 없는 경우**를 반드시 명시합니다. (HEARTBEAT_OK)

---

## 3. openclaw.json Heartbeat 설정

\`\`\`json
{
  "heartbeat": {
    "every": "1h",
    "activeHours": {
      "start": "08:00",
      "end": "22:00",
      "timezone": "Asia/Seoul"
    }
  }
}
\`\`\`

| 필드 | 설명 | 예시 |
|------|------|------|
| \`every\` | 하트비트 간격 | \`"30m"\`, \`"1h"\`, \`"2h"\` |
| \`activeHours.start\` | 활동 시작 시간 | \`"08:00"\` |
| \`activeHours.end\` | 활동 종료 시간 | \`"22:00"\` |
| \`activeHours.timezone\` | 타임존 | \`"Asia/Seoul"\` |

**\`activeHours\`를 설정하면** 해당 시간대 밖에서는 하트비트가 동작하지 않습니다. 새벽 3시에 깨어나서 아침 브리핑을 보내는 참사를 방지하는 첫 번째 안전장치입니다.

### 간격 설정 가이드

| 업무 성격 | 권장 간격 | 이유 |
|-----------|-----------|------|
| 긴급 모니터링 (장애 감지) | \`15m\` ~ \`30m\` | 빠른 대응 필요 |
| 일반 모니터링 (새 요청 확인) | \`1h\` | 적절한 균형 |
| 느긋한 확인 (재고 체크) | \`2h\` ~ \`4h\` | 급하지 않은 업무 |

---

## 4. Heartbeat vs Cron — 판단 매트릭스

이 둘을 혼동하면 반드시 사고가 납니다. 명확한 판단 기준을 세워둡시다.

### 한 줄 정의

| | Heartbeat | Cron |
|---|-----------|------|
| **성격** | "할 일 있어?" (모니터링) | "지금 해." (정시 실행) |
| **비유** | 당직 근무자가 순찰 도는 것 | 알람 시계 |
| **실행 조건** | 조건이 맞으면 실행 | 시간이 되면 무조건 실행 |
| **빈도** | 매 간격마다 체크 | 정해진 시간에 1회 |

### 판단 매트릭스

| 이런 업무라면... | Heartbeat | Cron |
|-----------------|:---------:|:----:|
| "긴급건 있어?" | O | X |
| "새 요청 들어왔어?" | O | X |
| "에러 로그 이상 없어?" | O | X |
| "매일 9시에 브리핑 보내줘" | X | O |
| "매주 월요일에 주간 리포트" | X | O |
| "매월 1일에 정산 보고서" | X | O |

### 쉬운 구분법

> **질문이 "~있어?"로 끝나면 Heartbeat, "~해줘"로 끝나면 Cron.**
>
> - "새 주문 들어왔**어**?" → Heartbeat
> - "아침 브리핑 보내**줘**" → Cron

---

## 5. 실전 사고 사례 3가지

뽀짝이(OpenClaw 에이전트)를 운영하면서 실제로 겪은 사고들입니다. 여러분은 같은 실수를 반복하지 마세요.

### 사고 #1: 새벽 3시 아침 브리핑 발송

**상황**: "매일 아침 브리핑을 보내줘"라고 HEARTBEAT.md에 적었습니다.

\`\`\`markdown
# BAD - 이렇게 쓰면 안 됩니다

## 매일 아침 브리핑
- 3개 사업 현황을 종합하여 브리핑 생성
- Slack #morning-briefing 채널에 발송
\`\`\`

**결과**: 에이전트는 새벽 3시 하트비트에서 "아침 브리핑이라고 되어 있네? 보내야지"라고 판단. 팀원들이 새벽에 알림을 받았습니다.

**원인**: **시간 조건이 명시되지 않았습니다.** 에이전트는 "아침"이라는 단어를 사람처럼 해석하지 않습니다. 명시적인 시간 범위가 없으면 조건이 충족된 것으로 판단합니다.

**해결책**:

\`\`\`markdown
# GOOD - 시간 조건을 반드시 명시

## 매일 오전 9시 — 아침 브리핑
> **시간 조건**: KST 08:30~09:30 사이 하트비트에서만 실행.
> 이 시간대 밖이면 절대 발송 금지!

- 3개 사업 현황을 종합하여 브리핑 생성
- Slack #morning-briefing 채널에 발송
\`\`\`

> **절대 규칙 #1**: HEARTBEAT.md에 "발송", "알림", "메시지"가 포함된 항목에는 반드시 **시간 조건**을 명시한다.

---

### 사고 #2: 아침 브리핑 2번 발송 (중복)

**상황**: 아침 브리핑을 HEARTBEAT.md에도 적고, Cron으로도 등록했습니다.

\`\`\`markdown
# HEARTBEAT.md
## 매일 오전 9시 — 아침 브리핑
> **시간 조건**: KST 08:30~09:30 사이 하트비트에서만 실행.
- 브리핑 생성 후 Slack 발송
\`\`\`

\`\`\`bash
# 동시에 이것도 등록
openclaw cron add \\
  --name "아침 브리핑" \\
  --cron "0 9 * * *" \\
  --tz "Asia/Seoul" \\
  --message "팀에게 아침 브리핑 발송"
\`\`\`

**결과**: 9시에 Cron이 발송하고, 9시 하트비트에서도 발송. 팀원들이 동일한 브리핑을 2번 받았습니다.

**원인**: **같은 작업이 Heartbeat과 Cron 양쪽에 등록되었습니다.**

**해결책**: 하나의 작업은 반드시 **한 곳에만** 등록합니다.

\`\`\`
정시 발송 업무 → Cron에만 등록 (HEARTBEAT.md에서 제거)
모니터링 업무 → HEARTBEAT.md에만 등록 (Cron 등록하지 않음)
\`\`\`

> **절대 규칙 #2**: 하나의 작업은 Heartbeat 또는 Cron 중 **한 곳에만** 등록한다. 양쪽 모두에 등록하면 100% 중복 실행된다.

---

### 사고 #3: 같은 오류 15번 보고 (메시지 폭탄)

**상황**: "에러 로그에 이상이 있으면 Slack에 알려줘"를 HEARTBEAT.md에 등록했습니다.

\`\`\`markdown
## 에러 모니터링
- 에러 로그에 새로운 에러가 있으면 Slack #ops-alert에 발송
\`\`\`

**결과**: 서버에 에러가 1건 발생. 이후 매 하트비트(1시간)마다 같은 에러를 계속 보고. 하루에 15번, 이틀간 30번의 동일한 알림이 발송되었습니다.

**원인**: **"이미 보고한 건을 다시 보고하지 마라"는 조건이 없었습니다.** 에이전트 입장에서는 매번 깨어날 때마다 에러 로그를 확인하고, 에러가 있으니 보고하는 것이 당연합니다.

**해결책**:

\`\`\`markdown
## 에러 모니터링
- 에러 로그에 **새로운** 에러가 있으면 Slack #ops-alert에 발송
- **중복 방지**: 이미 보고한 에러와 동일한 내용이면 발송하지 않음
- **판단 기준**: 에러 메시지 + 발생 시간이 이전 보고 건과 다를 때만 발송
- **최대 빈도**: 동일 유형의 에러는 최초 보고 후 6시간 이내 재보고 금지
\`\`\`

> **절대 규칙 #3**: 알림/발송 항목에는 반드시 **중복 방지 조건**과 **최대 빈도 제한**을 명시한다.

## 6. HEARTBEAT.md 시간 조건 필수 표기법

사고 #1에서 배운 교훈을 표준 표기법으로 정리합니다. 발송/알림이 포함된 모든 항목은 아래 형식을 따릅니다.

\`\`\`markdown
## {업무 이름}
> **시간 조건**: KST {시작}~{끝} 사이 하트비트에서만 실행.
> 이 시간대 밖이면 절대 발송 금지!

- 실행할 내용
\`\`\`

### 예시 모음

\`\`\`markdown
## 매일 오전 9시 — 아침 브리핑
> **시간 조건**: KST 08:30~09:30 사이 하트비트에서만 실행.
> 이 시간대 밖이면 절대 발송 금지!

- 3개 사업 현황을 종합하여 브리핑 생성
- Slack #morning-briefing 채널에 발송

---

## 매일 오후 6시 — 일일 리포트
> **시간 조건**: KST 17:30~18:30 사이 하트비트에서만 실행.
> 이 시간대 밖이면 절대 발송 금지!

- 오늘 처리된 주문 건수, 매출, 이슈 요약
- Slack #daily-report 채널에 발송
\`\`\`

### 왜 범위(08:30~09:30)로 쓰는가?

하트비트가 정확히 9:00에 뛰는 보장이 없습니다. \`every: "1h"\`로 설정하면 8:17, 9:17처럼 뛸 수도 있습니다. 따라서 **정시가 아니라 범위**로 지정해야 합니다.

> 만약 정확히 9:00에 실행해야 한다면? → **Cron을 사용하세요.** 그게 Cron의 존재 이유입니다.

## 7. Cron 설정

정시에 정확히 실행해야 하는 업무는 Cron을 사용합니다.

### cron add 명령어

\`\`\`bash
openclaw cron add \\
  --name "아침 브리핑" \\
  --cron "0 9 * * *" \\
  --tz "Asia/Seoul" \\
  --session isolated \\
  --message "팀에게 아침 브리핑 발송. 3개 사업 현황을 종합하여 브리핑 생성 후 Slack #morning-briefing에 발송."
\`\`\`

| 옵션 | 설명 |
|------|------|
| \`--name\` | 작업 이름 (관리용, 중복 불가) |
| \`--cron\` | Cron 표현식 |
| \`--tz\` | 타임존 |
| \`--session\` | \`isolated\` (독립 세션) 또는 \`shared\` (공유 세션) |
| \`--message\` | 에이전트에게 전달할 메시지 (구체적으로!) |

### Cron 표현식 빠른 참조

\`\`\`
분  시  일  월  요일
 *   *   *   *   *

0 9 * * *        → 매일 09:00
0 9 * * 1        → 매주 월요일 09:00
0 9 1 * *        → 매월 1일 09:00
0 9,18 * * *     → 매일 09:00, 18:00
0 */2 * * *      → 2시간마다 정각
30 8 * * 1-5     → 평일 08:30
\`\`\`

### --message를 구체적으로 쓰는 이유

\`\`\`bash
# BAD - 너무 모호
--message "브리핑 보내줘"

# GOOD - 구체적
--message "3개 사업(커머스, 교육, 컨설팅)의 어제 매출, 오늘 일정, 주요 이슈를 종합하여 브리핑을 생성하고, Slack #morning-briefing 채널에 발송. 형식은 마크다운 테이블."
\`\`\`

Cron은 독립 세션(\`--session isolated\`)에서 실행되므로, 이전 대화 맥락이 없습니다. 메시지만으로 에이전트가 완전히 이해할 수 있을 만큼 구체적으로 작성해야 합니다.

### 등록된 Cron 확인 및 관리

\`\`\`bash
# 목록 확인
openclaw cron list

# 출력 예시:
# NAME             SCHEDULE      TZ           NEXT RUN
# 아침 브리핑       0 9 * * *    Asia/Seoul   2026-03-23 09:00
# 주간 리포트       0 10 * * 1   Asia/Seoul   2026-03-24 10:00

# 삭제
openclaw cron delete --name "아침 브리핑"
\`\`\`

## 8. HEARTBEAT_OK — 할 일 없으면 OK

에이전트가 하트비트 체크리스트를 전부 확인했는데 할 일이 없으면, **\`HEARTBEAT_OK\`를 응답하고 종료**합니다.

이것이 중요한 이유:

1. **불필요한 작업 방지**: 할 일이 없는데 억지로 뭔가 하려는 것을 막습니다.
2. **로그 추적**: HEARTBEAT_OK 로그를 보면 "에이전트가 정상적으로 깨어났고, 확인은 했지만 할 일이 없었다"는 것을 알 수 있습니다.
3. **비용 절감**: 불필요한 API 호출이나 메시지 발송을 막습니다.

\`\`\`markdown
# HEARTBEAT.md 마지막에 반드시 명시

---

## 할 일이 없을 때
- 위의 모든 항목에서 실행 조건이 충족되지 않으면
- \`HEARTBEAT_OK\`를 응답하고 종료
- **절대 불필요한 메시지를 발송하지 말 것**
\`\`\`

---

## 9. 금지 패턴 리스트

실전에서 발견된 **절대 하면 안 되는 패턴**들입니다.

### 금지 #1: 시간 조건 없는 발송

\`\`\`markdown
# HEARTBEAT.md에서 절대 금지

## 아침 브리핑
- 브리핑 생성 후 Slack 발송
\`\`\`

시간 조건 없이 발송 작업을 넣으면, **매 하트비트마다** 발송됩니다.

### 금지 #2: 동일 작업 이중 등록

\`\`\`
HEARTBEAT.md: "9시에 브리핑 발송"
Cron: "0 9 * * * 브리핑 발송"
\`\`\`

반드시 중복 발송됩니다. **한 곳에만 등록하세요.**

### 금지 #3: 중복 방지 조건 없는 알림

\`\`\`markdown
## 에러 알림
- 에러가 있으면 알림 발송
\`\`\`

에러가 해결될 때까지 매 하트비트마다 같은 알림이 반복됩니다.

### 금지 #4: 모호한 조건

\`\`\`markdown
## 뭔가 이상하면 알려줘
- 시스템에 이상이 있으면 보고
\`\`\`

"이상"의 기준이 없습니다. 에이전트가 자의적으로 판단하게 됩니다.

### 금지 #5: Heartbeat에서 무거운 작업 실행

\`\`\`markdown
## 데이터 전체 백업
- 전체 데이터베이스를 백업
\`\`\`

하트비트는 가볍게, 빠르게 체크하는 용도입니다. 무거운 작업은 Cron에서 실행하세요.

## 10. 실전 자동화 구조

Heartbeat과 Cron을 조합한 실전 구조입니다.

\`\`\`
┌──────────────────────────────────────────────────┐
│                  하루의 자동화                       │
├──────────────────────────────────────────────────┤
│                                                    │
│  [Cron] 09:00  아침 브리핑 발송                      │
│  [Cron] 18:00  일일 리포트 발송                      │
│  [Cron] 10:00 (월) 주간 리포트 발송                   │
│  [Cron] 09:00 (1일) 월간 정산 리포트                  │
│                                                    │
│  [Heartbeat] 매 1시간                               │
│    ├─ 긴급 요청 확인                                 │
│    ├─ 주문 이상 감지                                 │
│    ├─ 재고 부족 알림                                 │
│    └─ 에러 로그 모니터링                              │
│                                                    │
│  activeHours: 08:00 ~ 22:00 KST                    │
│  (22시 이후 ~ 08시 이전: 하트비트 정지)                │
│                                                    │
└──────────────────────────────────────────────────┘
\`\`\`

### 역할 분담 원칙

| 역할 | 담당 | 이유 |
|------|------|------|
| 모니터링 | Heartbeat | 언제 발생할지 모르는 이벤트 감지 |
| 정시 발송 | Cron | 정확한 시간에 1회 실행 |
| 긴급 알림 | Heartbeat | 빠른 감지 필요 (간격 15~30분) |
| 일일/주간/월간 보고 | Cron | 정해진 주기, 정해진 시간 |

## 심화: Heartbeat 프로덕션 설정

기본 설정을 넘어서, 프로덕션 환경에서 Heartbeat를 세밀하게 제어하는 방법입니다.

\`\`\`json5
heartbeat: {
  every: "30m",
  model: "anthropic/claude-sonnet-4-6",  // 전용 모델 지정 가능
  target: "last",           // last | none | <channel>
  lightContext: false,       // true = HEARTBEAT.md만 로드
  isolatedSession: false,    // true = 별도 세션에서 실행
  activeHours: { start: "09:00", end: "22:00", timezone: "Asia/Seoul" },
  ackMaxChars: 300,          // HEARTBEAT_OK 최대 길이
  directPolicy: "allow"
}
\`\`\`

### target 옵션

| 값 | 동작 |
|---|------|
| \`"last"\` | 마지막으로 활성화된 채널에서 실행. 사용자가 가장 최근에 대화한 채널의 맥락을 이어받음 |
| \`"none"\` | 내부에서만 실행. 외부 채널에 메시지를 보내지 않고 체크만 수행 |
| \`"#ops-alert"\` | 특정 채널명을 직접 지정. 항상 해당 채널에서 실행 |

\`target: "none"\`은 외부 알림 없이 **내부 상태 점검만** 수행할 때 유용합니다. 예를 들어 에러 로그를 모니터링하되, 이상이 발견될 때만 별도 스킬을 호출하여 알림을 보내는 패턴에 적합합니다.

### lightContext: 비용 절감 모드

\`lightContext: true\`로 설정하면 하트비트 실행 시 **HEARTBEAT.md만** 로드합니다.

\`\`\`
lightContext: false (기본)
→ 로드: AGENTS.md + MEMORY.md + TOOLS.md + HEARTBEAT.md + memory/ 파일들
→ 약 100K 토큰

lightContext: true
→ 로드: HEARTBEAT.md만
→ 약 2-5K 토큰
\`\`\`

비용 차이가 극적입니다. 단순 모니터링(API 상태 체크, 에러 로그 확인 등)이라면 \`lightContext: true\`가 훨씬 효율적입니다. 다만 에이전트가 프로젝트 맥락을 모른 채 판단해야 하므로, HEARTBEAT.md에 필요한 맥락을 모두 포함시켜야 합니다.

### HEARTBEAT_OK와 ackMaxChars

에이전트가 할 일이 없을 때 반환하는 \`HEARTBEAT_OK\` 응답의 최대 길이를 \`ackMaxChars: 300\`으로 제한합니다. 이 응답은 자동으로 제거되어 채널을 오염시키지 않습니다.

만약 에이전트가 300자를 초과하는 응답을 하면? 그건 "할 일이 없다"가 아니라 "뭔가 보고할 게 있다"는 뜻이므로, HEARTBEAT_OK로 처리되지 않고 정상 메시지로 남습니다.

### 55분 Heartbeat와 Prompt Caching 최적화

Anthropic의 Prompt Cache TTL은 **1시간**입니다. 하트비트 간격을 \`"55m"\`으로 설정하면:

\`\`\`
09:00 — 하트비트 실행 → 시스템 프롬프트 캐시 생성 (TTL: 1h)
09:55 — 하트비트 실행 → 캐시 HIT (비용 90% 절감) + 캐시 TTL 갱신
10:50 — 하트비트 실행 → 캐시 HIT + TTL 갱신
...
\`\`\`

만약 \`"65m"\`으로 설정하면 매번 캐시가 만료된 후 실행되어 **캐시 MISS**가 발생합니다. 55분은 캐시 갱신과 비용 절감의 최적 균형점입니다.

## 심화: Cron 고급 기능

기본 \`cron add\` 명령을 넘어서, 프로덕션에서 필요한 고급 스케줄링 기능들입니다.

### 기본 스케줄링, 1회성 리마인드, 시스템 이벤트

\`\`\`bash
# 기본 스케줄링
openclaw cron add --name "아침 브리핑" --cron "0 9 * * *" --tz "Asia/Seoul" --session isolated --message "브리핑 생성"

# 1회성 리마인드
openclaw cron add --name "회의 알림" --at "2026-03-24T14:00" --message "회의 시작 10분 전"

# 시스템 이벤트 (메인 세션에 주입)
openclaw system event --text "긴급 확인" --mode now
openclaw system event --text "다음 체크" --mode next-heartbeat
\`\`\`

### isolated vs main session cron

| 모드 | 동작 | 적합한 작업 |
|------|------|-----------|
| \`--session isolated\` | 독립 세션에서 실행. 이전 대화 맥락 없음 | 정형화된 작업 (브리핑, 리포트) |
| \`--session main\` | 메인 세션에 메시지 주입. 기존 맥락 유지 | 맥락이 필요한 확인/판단 작업 |

\`isolated\`는 매번 깨끗한 상태에서 시작하므로 결과가 일관됩니다. \`main\`은 현재 대화 맥락을 활용할 수 있지만, 사용자가 대화 중일 때 cron 메시지가 끼어들 수 있습니다.

### 6-field cron (초 단위 지원)

OpenClaw는 표준 5-field cron 외에 **6-field cron**(초 단위)을 지원합니다.

\`\`\`
초  분  시  일  월  요일
 *   *   *   *   *   *

*/30 * * * * *     → 30초마다
0    0 9 * * *     → 매일 09:00:00 (정확히 0초)
15   0 * * * *     → 매 정시 15초
\`\`\`

주의: 초 단위 스케줄은 비용이 급증할 수 있습니다. 30초마다 실행하면 하루 2,880회 호출입니다. 반드시 \`lightContext: true\`와 함께 사용하세요.

### 로드 분산

여러 cron 작업이 같은 시간(예: 매일 9시)에 등록되어 있으면, OpenClaw는 자동으로 **0~5분 사이의 랜덤 지연**을 추가하여 로드를 분산합니다.

\`\`\`
등록: "0 9 * * *" (아침 브리핑)
등록: "0 9 * * *" (일일 체크)
등록: "0 9 * * *" (재고 확인)

실제 실행:
  아침 브리핑 → 09:00:00
  일일 체크   → 09:02:17 (자동 지연)
  재고 확인   → 09:04:33 (자동 지연)
\`\`\`

### sessionRetention과 maxConcurrentRuns

\`\`\`json5
cron: {
  sessionRetention: "24h",    // 크론 세션 이력 24시간 보관
  maxConcurrentRuns: 2         // 같은 cron job의 동시 실행 최대 2개
}
\`\`\`

- \`sessionRetention: "24h"\`: 크론 실행 이력을 24시간 동안 보관합니다. \`openclaw cron logs --name "아침 브리핑"\`으로 최근 실행 결과를 조회할 수 있습니다.
- \`maxConcurrentRuns: 2\`: 동일 크론 작업이 아직 실행 중인데 다음 스케줄이 도래하면, 최대 2개까지만 동시 실행을 허용합니다. 초과분은 스킵됩니다. 이전 작업이 지연되어 중복 실행되는 사고를 방지합니다.

## 심화: 비용 최적화 패턴

Heartbeat과 Cron의 비용을 최소화하는 실전 패턴들입니다.

### 패턴 1: Heartbeat를 로컬 Ollama 모델로 라우팅

단순 모니터링(API 상태 체크, 파일 존재 확인 등)에는 고가의 Claude 모델이 필요 없습니다. 로컬 Ollama 모델로 라우팅하면 월 약 $50를 절감할 수 있습니다.

\`\`\`json5
heartbeat: {
  every: "30m",
  model: "ollama/llama3.2:3b",   // 로컬 모델 → API 비용 $0
  lightContext: true,
  activeHours: { start: "09:00", end: "22:00", timezone: "Asia/Seoul" }
}
\`\`\`

로컬 모델의 한계:
- 복잡한 판단이 필요한 체크리스트에는 부적합
- HEARTBEAT.md를 더 구체적이고 단순하게 작성해야 함
- "이상 여부"를 판단하는 건 어렵지만, "수치가 X 이상인가?"는 가능

### 패턴 2: lightContext + isolatedSession 조합

\`\`\`json5
heartbeat: {
  lightContext: true,        // HEARTBEAT.md만 로드
  isolatedSession: true,     // 별도 세션에서 실행 (메인 세션 오염 방지)
}
\`\`\`

이 조합은 **최소 비용 체크**를 구현합니다:
- 로드되는 토큰: HEARTBEAT.md의 크기만큼 (보통 2-5K)
- 메인 세션의 컨텍스트를 전혀 건드리지 않음
- 단점: 프로젝트 맥락을 모르므로, HEARTBEAT.md에 모든 판단 기준을 명시해야 함

### 패턴 3: 여러 cron 대신 heartbeat 배치 체크

\`\`\`
[비효율적]
cron: "0 * * * *" → API 상태 체크
cron: "0 * * * *" → 에러 로그 확인
cron: "0 * * * *" → 재고 확인
→ 매시간 3개 세션 생성, 3배 비용

[효율적]
heartbeat: { every: "1h" }
HEARTBEAT.md:
  1. API 상태 체크
  2. 에러 로그 확인
  3. 재고 확인
→ 매시간 1개 세션, 1/3 비용
\`\`\`

비슷한 주기의 모니터링 작업은 HEARTBEAT.md에 통합하세요. Cron은 **정시 발송처럼 독립적인 실행이 필요한 작업**에만 사용합니다.

> 다음 장에서는 에이전트에게 구체적인 능력을 부여하는 **스킬(Skill)** 시스템을 다룹니다.
` },
  { id: "ch06", title: "스킬(Skill)", num: "06", content: `# Ch.06 스킬(Skill) — 에이전트에게 능력 부여하기

> **"n8n 워크플로우 100개를 만들었다. 그리고 전부 버렸다."**

에이전트가 아무리 똑똑해도, 구체적인 업무 수행 방법을 모르면 쓸모가 없습니다. "아침 브리핑 보내줘"라고 했을 때, 어디서 데이터를 가져오고, 어떤 형식으로 정리하고, 어디로 보내야 하는지 — 이 모든 것을 알려주는 것이 **스킬(Skill)**입니다.

## 1. 스킬이란 무엇인가

스킬은 에이전트의 **능력 단위**입니다.

사람으로 치면:
- "엑셀 다룰 줄 알아?" → 스킬
- "회의록 작성할 수 있어?" → 스킬
- "거래처에 발주서 보낼 수 있어?" → 스킬

에이전트로 치면:
- "아침 브리핑 생성할 수 있어?" → \`daily-briefing\` 스킬
- "리더 등록할 수 있어?" → \`register-leader\` 스킬
- "랜딩페이지 배포할 수 있어?" → \`deploy-landing\` 스킬

**스킬 = SKILL.md(설명서) + scripts/(실행 코드) + references/(참고 자료)**

## 2. n8n 100개 워크플로우를 버린 이유

OpenClaw 스킬 시스템이 탄생한 배경에는 n8n과의 뼈아픈 경험이 있습니다.

### n8n으로 자동화를 구축했을 때 벌어진 일

1. **수정이 너무 어렵다**
   - "브리핑에 매출 항목 하나만 추가해줘" → n8n 에디터 열고, 블록 찾고, JSON 수정하고, 연결 확인하고... 30분
   - 코드였으면? → 3줄 추가, 끝

2. **디버깅이 지옥이다**
   - 12개 블록 중 7번째에서 에러 → 어디서 잘못됐는지 찾으려면 각 블록의 입출력을 하나하나 확인
   - 블록 사이의 데이터 변환 과정이 GUI 뒤에 숨어 있어서 추적이 어려움

3. **문서가 없다**
   - n8n 워크플로우 자체가 문서? 아닙니다. 블록을 하나하나 클릭해봐야 무슨 로직인지 알 수 있음
   - 3개월 뒤에 다시 보면 "이게 왜 이렇게 연결되어 있지?" 상태

4. **맥락적 판단이 불가능하다**
   - n8n은 **정해진 경로**를 따릅니다. A → B → C, 무조건.
   - "평일이면 A, 주말이면 B, 그런데 긴급건이면 C" 같은 복잡한 분기가 늘어날수록 스파게티 워크플로우가 됩니다.

### n8n에서 TypeScript로 변환하면

\`\`\`
n8n: 12 블록 + 3 분기 + 4 데이터 변환
                    ↓
TypeScript: ~100줄
\`\`\`

12개 블록이 100줄의 코드가 됩니다. 그리고 그 100줄은:
- \`git diff\`로 변경 사항을 추적할 수 있고
- 에러가 나면 스택 트레이스로 정확한 위치를 알 수 있고
- 주석과 함수명으로 의도가 명확하게 드러나고
- 에이전트가 **맥락을 보고 판단**할 수 있습니다

## 3. SKILL.md 구조와 작성법

SKILL.md는 에이전트가 읽는 **스킬 설명서**입니다. 에이전트는 이 파일을 읽고 "아, 이 업무는 이렇게 하면 되는구나"를 이해합니다.

### 기본 구조

\`\`\`markdown
---
name: daily-briefing
description: 매일 아침 3개 사업 현황을 종합하여 브리핑 생성
---

# Daily Briefing 스킬

## 개요
3개 사업(커머스, 교육, 컨설팅)의 현황을 수집하여 아침 브리핑을 생성합니다.

## 실행 조건
- Cron에 의해 매일 09:00 KST에 호출됨
- 수동으로 "브리핑 만들어줘"라고 요청해도 실행 가능

## 실행 순서

### 1단계: 데이터 수집
- Notion "매출 대시보드"에서 어제 매출 데이터 조회
- Notion "일정" 데이터베이스에서 오늘 일정 조회
- Slack #issues 채널에서 미해결 이슈 조회

### 2단계: 브리핑 생성
- 아래 형식으로 마크다운 브리핑 생성:

\`\`\`
📊 {날짜} 아침 브리핑

| 사업부 | 어제 매출 | 전일 대비 | 주요 이슈 |
|--------|----------|----------|----------|
| 커머스 | {금액} | {증감} | {이슈} |
| 교육 | {금액} | {증감} | {이슈} |
| 컨설팅 | {금액} | {증감} | {이슈} |

📅 오늘 일정
- {일정 목록}

⚠️ 미해결 이슈
- {이슈 목록}
\`\`\`

### 3단계: 발송
- Slack #morning-briefing 채널에 발송
- 발송 실패 시 → #ops-alert에 에러 보고

## 예외 처리
- Notion API 에러 → "데이터 수집 실패" 메시지와 함께 부분 브리핑 발송
- 매출 데이터가 0원 → 정상 (휴일일 수 있음), 그대로 표시
- Slack 발송 실패 → 3회 재시도 후 로그에 기록

## 참고
- API 키와 채널 ID는 \`references/api-guide.md\` 참조
- Notion 데이터베이스 ID는 \`references/api-guide.md\` 참조
\`\`\`

### SKILL.md 작성 원칙

1. **에이전트가 읽는 문서**입니다. 사람이 아니라 에이전트 관점에서 쓰세요.
2. **실행 순서**를 명확하게 단계별로 적으세요.
3. **예외 처리**를 반드시 적으세요. 에이전트는 예외 상황에서 판단이 필요합니다.
4. **출력 형식**을 구체적으로 적으세요. "적절히 정리해서"가 아니라 템플릿을 제공하세요.

## 5. 스킬 로드 우선순위

에이전트가 스킬을 찾을 때의 우선순위입니다.

\`\`\`
1. Workspace  →  <workspace>/skills/      (현재 프로젝트 전용)
2. Shared     →  ~/.openclaw/skills/      (모든 프로젝트 공용)
3. Bundle     →  내장 스킬                  (OpenClaw 기본 제공)
\`\`\`

| 레벨 | 경로 | 용도 |
|------|------|------|
| **Workspace** | \`<workspace>/skills/\` | 이 프로젝트에서만 쓰는 스킬 |
| **Shared** | \`~/.openclaw/skills/\` | 여러 프로젝트에서 공통으로 쓰는 스킬 |
| **Bundle** | (내장) | OpenClaw이 기본 제공하는 스킬 |

**같은 이름의 스킬이 여러 레벨에 있으면?** Workspace가 우선합니다. 프로젝트별로 스킬을 커스터마이징할 수 있다는 뜻입니다.

\`\`\`
예: daily-briefing 스킬이 Workspace와 Shared 모두에 존재
→ Workspace 버전이 사용됨 (프로젝트별 커스터마이징)
\`\`\`

## 6. n8n vs Skills — 언제 무엇을 쓸까

n8n을 완전히 버리라는 뜻이 아닙니다. 각각 적합한 영역이 있습니다.

### 판단 기준

| 기준 | n8n | Skills |
|------|:---:|:------:|
| 단순 반복 (A → B → C) | O | X |
| 외부 웹훅 릴레이 | O | X |
| 빠른 프로토타이핑 | O | X |
| 맥락 의존 판단 | X | O |
| 복잡한 예외 처리 | X | O |
| 다중 시스템 연동 | X | O |
| 점점 복잡해지는 업무 | X | O |
| 버전 관리 필요 | X | O |

### 핵심 차이

\`\`\`
n8n:    트리거 → 블록A → 블록B → 블록C → 완료
        (정해진 경로를 따른다)

Skills: 에이전트가 SKILL.md를 읽고,
        상황을 판단하고,
        적절한 스크립트를 실행하고,
        결과에 따라 다음 행동을 결정한다.
        (맥락적으로 판단한다)
\`\`\`

### 실전 예시: "고객 문의 처리"

**n8n으로 구현하면:**
\`\`\`
웹훅 → 키워드 분류(if/else) → 답변 템플릿 선택 → 발송
\`\`\`
- "환불"이라는 키워드가 있으면 환불 템플릿, "배송"이면 배송 템플릿
- 키워드에 없는 문의가 오면? → 분류 실패, 기본 템플릿 발송 (고객 불만)

**Skills로 구현하면:**
\`\`\`
에이전트가 문의 내용을 읽고 → 맥락을 파악하고 →
"이 고객은 환불을 원하는 게 아니라 교환을 원하는 것 같다" →
교환 절차 안내 + 필요한 정보 요청
\`\`\`
- 에이전트가 SKILL.md의 예외 처리 가이드를 참고하여 맥락적으로 판단

# 리더 등록 스킬

## 개요
새로운 리더(강사/멘토) 정보를 Notion 데이터베이스에 등록하고,
해당 리더에게 Slack DM으로 온보딩 안내를 발송합니다.

## 필요한 정보
- 이름 (필수)
- 이메일 (필수)
- 전화번호 (필수)
- 전문 분야 (필수)
- Slack 사용자 ID (선택 — 없으면 이메일로 조회)

## 실행 순서

### 1단계: 입력 검증
- 필수 항목 누락 시 → 사용자에게 재요청
- 이메일 형식 검증
- 전화번호 형식 통일 (010-xxxx-xxxx)

### 2단계: 중복 확인
- Notion "리더" DB에서 이메일로 검색
- 이미 존재하면 → "이미 등록된 리더입니다. 정보를 업데이트할까요?" 확인

### 3단계: Notion 등록
- \`scripts/main.ts\`의 \`registerLeader()\` 함수 실행
- 등록 성공 시 → 생성된 페이지 URL 반환

### 4단계: Slack 안내 발송
- 리더의 Slack ID로 DM 발송
- 온보딩 안내 메시지 (가이드 문서 링크, 첫 미팅 일정 등)

## 예외 처리
- Notion API 실패 → 3회 재시도 후 사용자에게 수동 등록 요청
- Slack ID를 찾을 수 없음 → 이메일로 대체 안내 (생략 가능)
\`\`\`

**scripts/main.ts:**
\`\`\`typescript
const NOTION_API_KEY = process.env.NOTION_API_KEY!;
const LEADER_DB_ID = "abc123def456";

interface LeaderInfo {
  name: string;
  email: string;
  phone: string;
  expertise: string;
  slackId?: string;
}

export async function registerLeader(info: LeaderInfo) {
  // 중복 확인
  const existing = await searchByEmail(info.email);
  if (existing) {
    return { status: "duplicate", page: existing };
  }

  // Notion 페이지 생성
  const response = await fetch("https://api.notion.com/v1/pages", {
    method: "POST",
    headers: {
      "Authorization": \`Bearer \$\{NOTION_API_KEY}\`,
      "Content-Type": "application/json",
      "Notion-Version": "2022-06-28",
    },
    body: JSON.stringify({
      parent: { database_id: LEADER_DB_ID },
      properties: {
        "이름": { title: [{ text: { content: info.name } }] },
        "이메일": { email: info.email },
        "전화번호": { phone_number: info.phone },
        "전문 분야": { select: { name: info.expertise } },
      },
    }),
  });

  const page = await response.json();
  return { status: "created", page };
}

async function searchByEmail(email: string) {
  const response = await fetch(\`https://api.notion.com/v1/databases/\$\{LEADER_DB_ID}/query\`, {
    method: "POST",
    headers: {
      "Authorization": \`Bearer \$\{NOTION_API_KEY}\`,
      "Content-Type": "application/json",
      "Notion-Version": "2022-06-28",
    },
    body: JSON.stringify({
      filter: {
        property: "이메일",
        email: { equals: email },
      },
    }),
  });

  const data = await response.json();
  return data.results.length > 0 ? data.results[0] : null;
}
\`\`\`

# 이벤트 관리 스킬

## 개요
교육, 세미나, 워크숍 등 이벤트를 생성하고 참가자를 관리합니다.

## 지원하는 작업
1. **이벤트 생성**: Notion에 이벤트 페이지 생성 + Google Calendar 등록
2. **참가자 등록**: 이벤트에 참가자 추가 + 확인 메시지 발송

4. **참가자 목록 조회**: 특정 이벤트의 참가자 목록 반환

## 실행 순서 — 이벤트 생성

### 1단계: 정보 수집
- 이벤트명, 날짜, 시간, 장소, 정원, 설명

### 2단계: Notion 등록
- "이벤트" DB에 새 페이지 생성
- 상태: "모집중"

### 3단계: Google Calendar 등록
- \`scripts/main.ts\`의 \`createCalendarEvent()\` 실행
- 참석자에게 캘린더 초대 발송

### 4단계: 안내 메시지 생성
- 이벤트 안내 메시지를 생성하여 사용자에게 전달
- 사용자가 확인 후 발송 채널 지정

## 예외 처리
- 동일 날짜/시간에 이벤트 중복 → 사용자에게 확인 요청

# 랜딩페이지 배포 스킬

## 개요
마케팅 캠페인용 랜딩페이지를 템플릿 기반으로 생성하고 배포합니다.

## 지원 템플릿
- \`references/template-list.md\` 참조
- 기본 템플릿: 세미나 모집, 제품 소개, 이벤트 안내

## 실행 순서

### 1단계: 요구사항 확인
- 캠페인명, 타겟 URL 경로, 템플릿 종류
- 헤드라인, 서브 카피, CTA 문구
- 이미지 URL (선택)

### 2단계: 페이지 생성
- \`scripts/main.ts\`의 \`generateLanding()\` 실행
- 템플릿에 콘텐츠 주입
- 로컬에서 미리보기 생성

### 3단계: 사용자 확인
- 생성된 페이지 미리보기 URL 제공
- 수정 요청이 있으면 반영
- "배포해줘" 확인 후 다음 단계

### 4단계: 배포
- 지정된 호스팅에 배포
- 배포 완료 URL 반환
- UTM 파라미터 포함 최종 URL 생성

## 예외 처리
- 동일 URL 경로가 이미 존재 → 덮어쓸지 사용자에게 확인
- 배포 실패 → 에러 로그 첨부하여 보고
- 이미지 URL 접근 불가 → 기본 이미지로 대체 후 사용자에게 알림
\`\`\`

## 8. 스킬 작성 팁

### 팁 1: SKILL.md는 "신입 직원 인수인계서"처럼 쓰세요

에이전트는 매번 새로운 세션에서 SKILL.md를 읽습니다. 이전 맥락이 없을 수도 있습니다. 따라서 **아무런 사전 지식 없이도 이 문서만 보고 업무를 수행할 수 있어야** 합니다.

\`\`\`markdown
# BAD
## 브리핑 발송
- 평소대로 브리핑 만들어서 보내면 됨

# GOOD
## 브리핑 발송
- Notion "매출 대시보드" DB(ID: abc123)에서 어제 날짜 데이터 조회
- 아래 형식으로 마크다운 테이블 생성
- Slack #morning-briefing(ID: C01ABC) 채널에 발송
\`\`\`

### 팁 2: 예외 처리를 반드시 적으세요

에이전트가 가장 헤매는 순간은 **예상치 못한 상황**을 만났을 때입니다. "API가 실패하면?", "데이터가 비어있으면?", "중복이면?" — 이런 상황에 대한 가이드가 없으면 에이전트는 멈추거나 엉뚱한 행동을 합니다.

\`\`\`markdown
## 예외 처리
- API 타임아웃 → 3회 재시도, 그래도 실패하면 사용자에게 보고
- 데이터 0건 → 정상 케이스일 수 있음, "데이터 없음"으로 표시
- 이미 처리된 건 → 스킵하고 다음 건 처리
\`\`\`

### 팁 3: scripts/는 가능하면 \`bun\`으로 실행 가능하게

\`\`\`typescript
// scripts/main.ts
// bun run scripts/main.ts 로 단독 실행 가능하도록

export async function doSomething(params: Params) {
  // 스킬 로직
}

// 직접 실행 시 (테스트/디버깅용)
if (import.meta.main) {
  const result = await doSomething({
    name: "테스트",
    // ...
  });
  console.log(result);
}
\`\`\`

에이전트가 실행할 수도 있지만, 사람이 직접 \`bun run scripts/main.ts\`로 테스트할 수도 있어야 합니다.

### 팁 4: references/에 하드코딩 값을 모으세요

코드에 ID, URL, 매핑 테이블을 하드코딩하지 마세요. \`references/\`에 모아두면:
- 값이 바뀔 때 한 곳만 수정하면 됨
- 에이전트가 참조할 때 명확한 출처가 있음
- 코드 리뷰 시 로직과 설정이 분리되어 깔끔함

### 팁 5: 하나의 스킬은 하나의 업무 영역

\`\`\`
# BAD - 너무 많은 것을 하는 스킬
manage-everything/
  SKILL.md  ← "리더 등록도 하고, 이벤트도 만들고, 브리핑도 보내고..."

# GOOD - 업무 영역별로 분리
register-leader/
manage-event/
daily-briefing/
\`\`\`

## 10. 요약

| 개념 | 설명 |
|------|------|
| **스킬** | 에이전트의 능력 단위. SKILL.md + scripts/ + references/ |
| **SKILL.md** | 에이전트가 읽는 설명서. 실행 순서와 예외 처리 포함 |
| **scripts/** | 실행 코드. TypeScript로 작성, bun으로 실행 |
| **references/** | API 키, ID 매핑, 가이드 등 참고 자료 |
| **로드 우선순위** | Workspace > Shared > Bundle |
| **n8n과의 차이** | n8n은 정해진 경로, 스킬은 맥락적 판단 |

### n8n을 버려야 하는 신호

- [ ] 분기(if/else)가 5개 이상 되었다
- [ ] "이 블록 왜 있지?" 싶은 블록이 3개 이상이다
- [ ] 워크플로우 수정에 30분 이상 걸린다
- [ ] 에러가 나면 어디서 터졌는지 찾기 어렵다
- [ ] "예외 케이스" 처리를 위한 분기가 계속 늘어난다

위 항목 중 2개 이상 해당하면, 그 워크플로우는 스킬로 전환할 때입니다.

## 심화: SKILL.md 전체 frontmatter

기본적인 \`name\`과 \`description\` 외에도, SKILL.md의 frontmatter에는 다양한 고급 옵션을 지정할 수 있습니다.

\`\`\`yaml
---
name: my-skill
description: Brief explanation
homepage: https://example.com
user-invocable: true
disable-model-invocation: false
command-dispatch: tool
command-tool: exec
command-arg-mode: raw
metadata:
  openclaw:
    requires:
      bins: ["jq", "curl"]
      env: ["MY_API_KEY"]
    os: ["darwin", "linux"]
    emoji: "🔧"
    primaryEnv: MY_API_KEY
    install:
      brew: { formula: "my-tool" }
---
\`\`\`

### 주요 필드 설명

| 필드 | 설명 |
|------|------|
| \`user-invocable: true\` | 사용자가 \`/my-skill\`처럼 직접 호출 가능. \`false\`면 다른 스킬이나 에이전트를 통해서만 실행 |
| \`disable-model-invocation: true\` | LLM이 자동으로 이 스킬을 호출하는 것을 차단. 사용자 명시적 호출만 허용 |
| \`command-dispatch: tool\` | 모델을 우회하여 직접 실행. LLM 토큰을 소비하지 않고 스크립트를 바로 실행 |
| \`command-tool: exec\` | 실행에 사용할 도구 지정 |
| \`command-arg-mode: raw\` | 인자를 가공 없이 그대로 전달 |

### requires: 의존성 자동 체크

\`\`\`yaml
requires:
  bins: ["jq", "curl", "bun"]    # 시스템에 설치되어 있어야 하는 바이너리
  env: ["MY_API_KEY", "SLACK_TOKEN"]  # 설정되어 있어야 하는 환경변수
\`\`\`

스킬 로드 시 \`bins\`에 나열된 바이너리와 \`env\`에 나열된 환경변수가 존재하는지 자동으로 확인합니다. 누락된 항목이 있으면 에이전트에게 알려주고, \`install\` 섹션에 설치 방법이 명시되어 있으면 자동 설치를 시도합니다.

### {baseDir} 변수

스크립트 경로를 지정할 때 \`{baseDir}\`을 사용하면 스킬 폴더의 절대 경로로 자동 치환됩니다.

\`\`\`markdown
## 실행 순서
1. \`{baseDir}/scripts/main.ts\` 실행
2. 결과를 \`{baseDir}/output/\` 폴더에 저장
\`\`\`

스킬이 Workspace(\`<workspace>/skills/\`)에 있든 Shared(\`~/.openclaw/skills/\`)에 있든 경로가 올바르게 해석됩니다.

## 심화: 스킬 토큰 비용

스킬은 무료가 아닙니다. 등록된 스킬마다 시스템 프롬프트에 오버헤드가 추가됩니다.

### 스킬당 오버헤드

\`\`\`
스킬 1개 등록 시:
  이름 (name):        ~4 토큰
  설명 (description): ~20 토큰
  ──────────────────────────
  합계:              ~24 토큰/스킬
\`\`\`

24토큰은 미미해 보이지만, 스킬이 50개면 1,200토큰, 100개면 2,400토큰입니다. 매 API 호출마다 이 비용이 발생합니다.

### 스킬이 많을수록 시스템 프롬프트 증가

\`\`\`
스킬 10개:  ~240 토큰 추가
스킬 50개:  ~1,200 토큰 추가
스킬 100개: ~2,400 토큰 추가
\`\`\`

Prompt Caching이 적용되면 캐시 HIT 시 비용이 90% 절감되지만, 캐시 MISS(스킬 목록이 변경될 때)에는 원래 비용이 발생합니다.

### 불필요한 스킬 비활성화

자주 사용하지 않는 스킬은 \`openclaw.json\`의 \`entries\`에서 \`enabled: false\`로 설정하세요.

\`\`\`json5
skills: {
  entries: {
    "rarely-used-skill": { enabled: false },
    "seasonal-skill": { enabled: false }
  }
}
\`\`\`

비활성화된 스킬은 시스템 프롬프트에 포함되지 않아 토큰을 절약합니다. 필요할 때 \`enabled: true\`로 다시 활성화하면 됩니다.

## 심화: ClawHub 레지스트리

ClawHub는 OpenClaw 커뮤니티의 **스킬 마켓플레이스**입니다. 직접 만들지 않아도 검증된 스킬을 설치하여 바로 사용할 수 있습니다.

### 기본 명령어

\`\`\`bash
# 스킬 설치
clawhub install <skill-slug>

# 모든 설치된 스킬 업데이트
clawhub update --all

# 로컬 스킬을 레지스트리와 동기화
clawhub sync --all
\`\`\`

### 커뮤니티 규모

- **13,729+ 커뮤니티 스킬** 등록 (2026년 3월 기준)
- 카테고리: 마케팅, 개발, 데이터 분석, 고객 응대, 콘텐츠 제작 등

### 보안 검증 3단계

ClawHub에 등록되는 모든 스킬은 3단계 보안 검증을 거칩니다.

| 단계 | 검증 방법 | 설명 |
|------|----------|------|
| 1단계 | Auto Scan | VirusTotal + OpenClaw AI가 자동으로 코드 분석. 악성 패턴, 의심스러운 API 호출, 데이터 유출 시도 탐지 |
| 2단계 | Community Verification | 커뮤니티 사용자들의 리뷰와 신고. 설치 수, 평점, 이슈 리포트 집계 |
| 3단계 | Code Behavior | 실제 실행 환경에서의 행동 분석. 네트워크 요청, 파일 시스템 접근 패턴 모니터링 |

3단계를 모두 통과한 스킬에는 "Verified" 배지가 부여됩니다. 검증되지 않은 스킬도 설치할 수 있지만, 경고 메시지가 표시됩니다.

## 심화: openclaw.json 스킬 설정

\`openclaw.json\`에서 스킬의 로드, 활성화, 환경변수를 세밀하게 제어할 수 있습니다.

\`\`\`json5
skills: {
  entries: {
    "daily-briefing": { enabled: true, env: { API_KEY: "xxx" } },
    "cs-responder": { enabled: true, apiKey: { source: "env", id: "CS_KEY" } }
  },
  allowBundled: ["weather", "image"],
  load: { watch: true, watchDebounceMs: 250, extraDirs: ["/extra/skills"] }
}
\`\`\`

### entries: 개별 스킬 설정

| 필드 | 설명 |
|------|------|
| \`enabled\` | 스킬 활성화 여부. \`false\`면 시스템 프롬프트에서 제외 |
| \`env\` | 해당 스킬 전용 환경변수. 글로벌 \`.env\`보다 우선 |
| \`apiKey\` | API 키 소스 지정. \`source: "env"\`면 시스템 환경변수에서, \`source: "file"\`이면 파일에서 읽음 |

### allowBundled: 내장 스킬 선택적 허용

OpenClaw이 기본 제공하는 내장(Bundle) 스킬 중 사용할 것만 명시합니다. 빈 배열(\`[]\`)이면 내장 스킬을 모두 차단합니다.

### load: 스킬 로드 설정

| 필드 | 설명 |
|------|------|
| \`watch: true\` | 스킬 폴더의 파일 변경을 감지하여 자동 리로드 |
| \`watchDebounceMs: 250\` | 파일 변경 감지 후 250ms 대기 후 리로드 (빈번한 저장 시 중복 리로드 방지) |
| \`extraDirs\` | 기본 경로(\`<workspace>/skills/\`, \`~/.openclaw/skills/\`) 외에 추가로 스킬을 로드할 폴더 |

\`extraDirs\`는 팀 공유 스킬 폴더를 지정할 때 유용합니다. 예를 들어 NAS나 공유 드라이브에 있는 스킬 폴더를 가리킬 수 있습니다.

> 다음 장에서는 여러 스킬을 조합하여 복잡한 업무를 자동화하는 **워크플로우 오케스트레이션**을 다룹니다.
` },

> "AI는 금붕어처럼 3초 기억력이다?" — 아닙니다. 제대로 설계하면 AI는 당신보다 더 정확하게 기억합니다.

## 1. RAG vs Full-context Loading

AI에게 정보를 기억시키는 방식은 크게 두 가지입니다.

### RAG (Retrieval-Augmented Generation)

\`\`\`
질문 → 벡터 검색 → 관련 조각(chunk) 추출 → LLM에 전달
\`\`\`

- 대규모 문서에서 **관련 부분만** 꺼내서 프롬프트에 넣는 방식
- 장점: 토큰을 아낄 수 있음
- 단점: 검색 품질에 의존, 맥락이 잘릴 수 있음, 인프라 필요 (임베딩 DB, 청킹 파이프라인)

### Full-context Loading (뽀짝이 방식)

\`\`\`
파일 통째로 읽기 → 전체를 프롬프트에 넣기
\`\`\`

- **뽀짝이는 RAG를 쓰지 않습니다.** 파일을 통째로 읽습니다.
- 장점: 맥락이 잘리지 않음, 구현이 단순, 검색 실패 없음
- 단점: 토큰 소비가 큼

### 왜 뽀짝이는 RAG를 안 쓸까?

| 기준 | RAG | Full-context |
|------|-----|-------------|
| 구현 복잡도 | 높음 (임베딩, 벡터DB) | 낮음 (파일 읽기) |
| 맥락 보존 | 부분적 | 완전 |
| 비용 | 토큰 절약 | 토큰 많이 씀 |
| 정확도 | 검색 품질에 의존 | 전체가 들어가니 높음 |
| 적합한 상황 | 수백 페이지 문서 | 수십 페이지 이하의 핵심 문서 |

뽀짝이의 설계 철학은 **"핵심 문서를 정제해서 통째로 넣자"**입니다. AGENTS.md, MEMORY.md 같은 파일은 어차피 수십 KB 수준이라 통째로 넣어도 됩니다. 대신 그 파일 자체를 **잘 정리하는 것**이 핵심입니다.

> **실전 감각**: RAG가 필요한 건 수백 페이지짜리 매뉴얼을 다룰 때입니다. 에이전트의 정체성과 규칙을 다루는 수준이라면 Full-context가 훨씬 낫습니다.

---

## 2. 기억의 3단계

뽀짝이의 기억은 **3개 층**으로 이루어져 있습니다. 아래로 갈수록 오래 살아남습니다.

\`\`\`
┌─────────────────────────────────────────────┐
│  Layer 3: 시스템 파일 (AGENTS.md, MEMORY.md) │  ← 영구 기억
│  ─────────────────────────────────────────── │
│  Layer 2: 메모리 파일 (memory/YYYY-MM-DD.md) │  ← 세션 간 다리
│  ─────────────────────────────────────────── │
│  Layer 1: 대화 맥락 (현재 세션의 대화)        │  ← 가장 휘발적
└─────────────────────────────────────────────┘
\`\`\`

### Layer 1: 대화 맥락 (세션 안의 기억)

**비유: 칠판**

수업 중에 칠판에 적는 내용입니다. 수업이 끝나면 지워집니다.

- 현재 세션의 모든 대화 내용
- 가장 풍부하지만, 가장 먼저 사라짐
- 컨텍스트 윈도우에 직접 들어있음
- 세션이 끝나면? **증발합니다.**

\`\`\`
사용자: 오늘 마케팅 회의에서 나온 핵심 3가지 정리해줘
뽀짝이: (정리함)
사용자: 고마워!
--- 세션 종료 ---
(다음 세션에서 "아까 그 3가지 뭐였지?"라고 물으면... 모릅니다)
\`\`\`

### Layer 2: 메모리 파일 (세션 사이의 다리)

**비유: 노트**

칠판에 적었던 중요한 내용을 노트에 옮겨 적는 것입니다. 다음 수업 때 노트를 펼치면 됩니다.

- \`memory/YYYY-MM-DD.md\` 형식의 일별 파일
- 세션에서 발견한 중요한 내용을 여기에 기록
- 다음 세션 시작 시 이 파일을 읽으면 맥락이 이어짐

\`\`\`markdown
<!-- memory/2026-03-22.md -->

\`\`\`

### Layer 3: 시스템 파일 (영구 기억)

**비유: 교실 벽에 붙인 쪽지**

칠판은 매번 지워지고, 노트는 잃어버릴 수 있지만, 교실 벽에 붙인 쪽지는 **항상** 거기 있습니다.

- \`AGENTS.md\` — 에이전트의 정체성, 역할, 규칙
- \`MEMORY.md\` — 프로젝트 전체에 걸친 핵심 기억
- 매 세션 시작 시 **원본 그대로** 로딩됨
- 컴팩션의 영향을 받지 않음

## 3. 기억의 승격

기억은 아래에서 위로 **승격**됩니다. 모든 대화 내용이 영구 기억이 될 필요는 없습니다. 정말 중요한 것만 올라갑니다.

\`\`\`
대화에서 중요한 것 발견
→ memory/ 파일에 기록
→ 정말 핵심이면 MEMORY.md나 AGENTS.md에 반영
\`\`\`

### 승격 기준

| 단계 | 어디에 저장 | 승격 조건 |
|------|-----------|----------|
| 대화 → memory/ | memory/YYYY-MM-DD.md | "내일도 알아야 할 내용인가?" |
| memory/ → MEMORY.md | MEMORY.md | "매 세션마다 알아야 할 내용인가?" |
| memory/ → AGENTS.md | AGENTS.md | "에이전트의 행동 규칙을 바꿔야 하는가?" |

### 승격 예시

**상황**: 대화 중 사용자가 "SD 발주서에서 수량이 5개 이상이면 별도 배송으로 처리해"라고 말함.

\`\`\`
[1단계 - 대화]
사용자: SD 발주서에서 수량 5개 이상이면 별도 배송으로 처리해줘
뽀짝이: 알겠습니다. 수량 5 이상은 별도 배송으로 분리하겠습니다.

[2단계 - memory/ 기록]
# memory/2026-03-22.md에 추가:
- SD 발주서: 수량 5개 이상 → 별도 배송 처리 (사용자 요청)

[3단계 - AGENTS.md 반영] (이것이 영구 규칙이 되어야 한다면)
# AGENTS.md의 SD 발주서 섹션에 추가:
- 수량 5개 이상: 별도 배송으로 분리 처리
\`\`\`

> **판단 기준**: "이걸 까먹으면 사용자가 다시 말해야 하나?" — Yes라면 승격하세요.

---

## 4. 컴팩션과 기억 보호

### 컴팩션이란?

대화가 길어지면 컨텍스트 윈도우가 꽉 찹니다. 이때 오래된 대화를 **요약**해서 압축하는 과정이 컴팩션입니다.

\`\`\`
[컴팩션 전]
메시지 1: 안녕하세요, 오늘 발주서 작업할게요
메시지 2: SD로 해주세요
메시지 3: (발주서 생성 과정...)
메시지 4: (수량 분리 처리...)
메시지 5: 감사합니다
메시지 6: 이제 송장 입력할게요
메시지 7: ...

[컴팩션 후]
[요약: SD 발주서를 생성하고 수량 분리 처리를 완료함]
메시지 6: 이제 송장 입력할게요
메시지 7: ...
\`\`\`

### 컴팩션에서 안전한 것 vs 위험한 것

| 구분 | 컴팩션 영향 | 이유 |
|------|-----------|------|
| 시스템 파일 (AGENTS.md, MEMORY.md) | **안전** | 매번 원본 로딩 |
| memory/ 파일 | **안전** | 파일로 저장되어 있음 |
| 오래된 대화 내용 | **위험** | 요약 과정에서 세부사항 유실 |

### 기억 보호 전략

**핵심 원칙: 중요한 건 파일에 적어라.**

컴팩션은 대화(Layer 1)에만 영향을 줍니다. 파일에 기록된 것(Layer 2, 3)은 절대 컴팩션 대상이 아닙니다.

\`\`\`
[안전하지 않은 패턴]
사용자: "앞으로 SD 발주서는 항상 수량 체크해줘"
→ 대화에만 남아있음
→ 컴팩션되면 사라질 수 있음

[안전한 패턴]
사용자: "앞으로 SD 발주서는 항상 수량 체크해줘"
뽀짝이: memory/2026-03-22.md에 기록했습니다.
→ 파일에 저장됨
→ 컴팩션과 무관하게 보존
\`\`\`

## 5. Prompt Caching

### 원리

API를 호출할 때마다 시스템 프롬프트 + 대화 내용을 보냅니다. Prompt Caching은 **변하지 않는 부분**을 캐시에 저장해서 비용을 줄이는 기술입니다.

\`\`\`
┌──────────────────────────────────┐
│  시스템 프롬프트 (잘 안 바뀜)     │  ← 캐시 대상 (앞쪽)
│  ─────────────────────────────── │
│  AGENTS.md 내용                  │  ← 캐시 대상
│  MEMORY.md 내용                  │  ← 캐시 대상
│  ─────────────────────────────── │
│  대화 메시지들 (매번 바뀜)        │  ← 캐시 안 됨 (뒤쪽)
└──────────────────────────────────┘
\`\`\`

### 배치 순서가 중요하다

\`\`\`
[올바른 순서]
1. 시스템 프롬프트    ← 캐시 O (거의 안 변함)
2. AGENTS.md         ← 캐시 O (거의 안 변함)
3. MEMORY.md         ← 캐시 O (가끔 변함)
4. memory/ 파일들     ← 캐시 △ (날마다 변함)
5. 대화 메시지들      ← 캐시 X (매번 변함)

[잘못된 순서]
1. 대화 메시지들      ← 매번 변하니까...
2. 시스템 프롬프트    ← 앞이 바뀌면 캐시 무효!
\`\`\`

### 비용 절감 효과

\`\`\`
일반 입력 토큰 비용:     $3 / 1M tokens (Claude Sonnet 기준)
캐시 적중 시:           $0.3 / 1M tokens
                        → 90% 절감!

캐시 미스 (최초 저장):   $3.75 / 1M tokens (25% 추가)
\`\`\`

> **실전 감각**: AGENTS.md와 MEMORY.md를 합쳐서 5,000 토큰이라면, 100번 대화하면 약 $1.35 절약됩니다. 소소해 보이지만 쌓이면 큽니다.

## 6. 세션의 일생

하나의 세션이 태어나서 죽기까지의 전체 생애주기입니다.

\`\`\`
[1. 탄생]
시스템 파일 로딩: AGENTS.md, MEMORY.md, TOOLS.md
→ "나는 누구인가, 무엇을 할 수 있는가"를 인식

[2. 기억 복구]
memory/ 폴더의 최근 파일 로딩
→ "최근에 무슨 일이 있었는가"를 파악

[3. 대화 축적]
사용자와 대화 시작
→ 컨텍스트 윈도우에 대화 내용이 쌓임

[4. 컴팩션 (필요시)]
컨텍스트 윈도우가 한계에 가까워지면
→ 오래된 대화를 요약/압축
→ 세부사항 일부 유실 가능

[5. 기억 전이]
중요한 발견이 있으면
→ memory/YYYY-MM-DD.md에 기록
→ 정말 핵심이면 MEMORY.md에 반영

[6. 종료]
세션 종료
→ 대화 내용(Layer 1)은 사라짐
→ 파일에 기록된 것(Layer 2, 3)은 남음
\`\`\`

### 시각적 타임라인

\`\`\`
시간 →→→→→→→→→→→→→→→→→→→→→→→→→→→→→→→

세션 시작        대화 중           컴팩션          세션 종료
    |              |                |               |
    ├─ 시스템 파일  ├─ 대화 축적     ├─ 오래된 대화   ├─ 대화 소멸
    │  로딩        │               │  요약          │
    ├─ memory/     ├─ 중요 발견!    │               ├─ memory/ 보존
    │  파일 로딩   │  → 파일 기록   │               │
    │              │               │               ├─ 시스템 파일
    │              │               │               │  변함없이 보존
\`\`\`

## 7. MEMORY.md 작성 가이드

### 뭘 적어야 하는가?

**적어야 하는 것:**
- 프로젝트의 핵심 맥락 (이름, 목적, 타겟)
- 기술 스택과 제약사항
- 반복해서 발생하는 실수와 방지법
- 사용자의 선호/스타일
- 자주 쓰는 경로와 파일 위치

**적지 말아야 하는 것:**
- 일시적인 작업 내용 (→ memory/ 파일에)
- 너무 세부적인 코드 로직 (→ 코드 주석에)
- 자주 바뀌는 정보 (→ 캐시 효율 저하)

## 기록 트리거
다음 상황이 발생하면 반드시 memory/ 파일에 기록할 것:
- 사용자가 "앞으로는~" 또는 "항상~"이라고 말할 때
- 새로운 버그를 발견했을 때
- 기존 규칙을 변경하는 결정이 내려졌을 때
- 새로운 상품 패턴이나 업체가 추가될 때

### 팁 2: "기억 테스트"를 해라

새 세션을 시작할 때, 이전 세션의 핵심 내용을 에이전트에게 물어보세요.

\`\`\`
사용자: 어제 작업한 내용 요약해줘
뽀짝이: (memory/2026-03-21.md를 읽고 답변)

→ 대답이 정확하면: 기억 시스템이 잘 작동 중
→ 대답이 부실하면: memory/ 파일 작성이 부족한 것
\`\`\`

### 팁 3: "MEMORY.md는 이력서처럼" 써라

MEMORY.md는 에이전트의 이력서입니다. 새로운 세션이 시작될 때마다 이 파일을 읽고 "나는 이런 프로젝트에서 이런 역할을 하는 에이전트구나"를 파악합니다.

<!-- 나쁜 MEMORY.md: 일기장처럼 씀 -->
3월 20일에 발주서 했고, 3월 21일에 송장 넣었고...

<!-- 좋은 MEMORY.md: 이력서처럼 씀 -->

- SD 발주서 수량 2+ → 사용자 확인 필수

## 심화: 컨텍스트 프루닝과 캐시

대화가 길어지면 컨텍스트 윈도우가 부족해집니다. \`openclaw.json\`에서 프루닝(정리)과 컴팩션(압축) 전략을 세밀하게 제어할 수 있습니다.

\`\`\`json5
agents: {
  defaults: {
    contextPruning: { mode: "cache-ttl", ttl: "1h" },
    compaction: { mode: "safeguard" }
  }
}
\`\`\`

### contextPruning: cache-ttl 모드

\`cache-ttl\` 모드는 **1시간 동안 참조되지 않은 컨텍스트를 자동으로 정리**합니다.

\`\`\`
09:00 — 사용자: "발주서 만들어줘" → 컨텍스트에 추가
09:30 — 사용자: "수량 확인해줘"  → 09:00 메시지 참조됨 (TTL 갱신)
10:00 — 사용자: "송장 입력해줘"  → 새로운 주제 시작
11:00 — 프루닝 실행 → 09:00, 09:30 메시지 정리 (1시간 동안 미참조)
\`\`\`

TTL 값은 업무 성격에 따라 조정합니다:
- \`"30m"\`: 짧은 대화가 빈번한 경우 (CS 응대)
- \`"1h"\`: 일반적인 업무 대화 (권장)
- \`"4h"\`: 긴 호흡의 작업 (코드 리뷰, 문서 작성)

### compaction: safeguard 모드

\`safeguard\` 컴팩션은 **시스템 프롬프트를 보호하면서 대화만 압축**합니다.

\`\`\`
[safeguard 컴팩션 동작]
보호 대상 (절대 압축 안 함):
  - 시스템 프롬프트
  - AGENTS.md 내용
  - MEMORY.md 내용
  - TOOLS.md 내용

압축 대상:
  - 오래된 대화 메시지 → 요약으로 대체
  - 도구 실행 결과 → 핵심 결과만 보존
\`\`\`

다른 컴팩션 모드와의 비교:

| 모드 | 동작 | 위험도 |
|------|------|--------|
| \`"none"\` | 압축 안 함 (컨텍스트 초과 시 에러) | 안전하지만 제한적 |
| \`"aggressive"\` | 오래된 것부터 적극 압축 | 세부사항 유실 위험 |
| \`"safeguard"\` | 시스템 파일 보호 + 대화만 압축 | 권장 — 균형 잡힌 전략 |

## 심화: Prompt Caching 설정

Prompt Caching은 비용 절감의 핵심입니다. \`openclaw.json\`에서 모델별로 캐시 전략을 지정할 수 있습니다.

\`\`\`json5
agents: {
  defaults: {
    models: {
      "anthropic/claude-opus-4-6": {
        params: { cacheRetention: "long" }  // none | short (5min) | long (1h)
      }
    }
  }
}
\`\`\`

### cacheRetention 옵션

| 값 | 캐시 TTL | 적합한 상황 |
|---|----------|-----------|
| \`"none"\` | 캐시 없음 | 매번 다른 시스템 프롬프트를 사용하는 경우 |
| \`"short"\` | 5분 | 빠른 대화 (기본값) |
| \`"long"\` | 1시간 | 긴 작업 세션, heartbeat 조합 (권장) |

\`"long"\`을 권장하는 이유: 55분 heartbeat와 조합하면 캐시가 만료되기 직전에 갱신되어, **시스템 프롬프트 비용을 거의 0에 가깝게** 유지할 수 있습니다.

### 캐시 진단

캐시가 제대로 작동하는지 확인하려면 진단 로그를 활성화합니다.

\`\`\`json5
diagnostics: { cacheTrace: { enabled: true, filePath: "~/.openclaw/logs/cache-trace.jsonl" } }
\`\`\`

또는 환경변수로 간단히 활성화:

\`\`\`bash
OPENCLAW_CACHE_TRACE=1
\`\`\`

진단 로그 출력 예시:

\`\`\`jsonl
{"ts":"2026-03-23T09:00:00Z","model":"claude-opus-4-6","cacheHit":true,"cachedTokens":8500,"newTokens":1200}
{"ts":"2026-03-23T09:55:00Z","model":"claude-opus-4-6","cacheHit":true,"cachedTokens":8500,"newTokens":800}
{"ts":"2026-03-23T11:05:00Z","model":"claude-opus-4-6","cacheHit":false,"cachedTokens":0,"newTokens":9700}
\`\`\`

\`cacheHit: false\`가 빈번하면 캐시 전략을 점검해야 합니다. 시스템 프롬프트가 자주 변경되거나, TTL이 너무 짧은 것이 원인일 수 있습니다.

### Provider별 Prompt Caching 지원

| Provider | 지원 여부 | 비고 |
|----------|:---------:|------|
| Anthropic 직접 | O | 완전 지원. \`cacheRetention\` 설정 가능 |
| Bedrock Claude | O | AWS Bedrock을 통한 Claude 호출도 캐시 지원 |
| OpenRouter Claude | O | OpenRouter 경유 시에도 캐시 적용 |
| OpenAI 호환 API | X | Prompt Caching 미지원 |
| 기타 Provider | X | 제공자별 확인 필요 |

캐시를 지원하지 않는 Provider를 사용하면 \`cacheRetention\` 설정은 무시되고, 매 요청마다 전체 토큰 비용이 발생합니다.

## 심화: bootstrapMaxChars 제한

에이전트가 세션을 시작할 때 로드하는 파일(AGENTS.md, MEMORY.md, SOUL.md 등)에는 크기 제한이 있습니다.

\`\`\`
bootstrapMaxChars:      20,000  (파일 1개당 최대 문자 수)
bootstrapTotalMaxChars: 150,000 (모든 부트스트랩 파일의 합계 최대)
\`\`\`

### 파일별 제한: 20,000자

하나의 파일이 20,000자를 초과하면 **잘립니다(truncated)**. 잘림이 발생하면 파일 끝부분의 내용이 누락되므로, 중요한 규칙이 파일 뒷부분에 있으면 에이전트가 인식하지 못할 수 있습니다.

\`\`\`
AGENTS.md (18,000자) → 전체 로드 O
MEMORY.md (25,000자) → 20,000자까지만 로드, 5,000자 잘림!
\`\`\`

### 전체 합계 제한: 150,000자

모든 부트스트랩 파일의 합계가 150,000자를 초과하면 우선순위가 낮은 파일부터 잘립니다.

### 실전 가이드: 간결하게 유지

| 파일 | 권장 크기 | 내용 |
|------|----------|------|
| SOUL.md | 3,000자 이내 | 정체성, 톤, 핵심 가치 |
| AGENTS.md | 10,000자 이내 | 역할, 규칙, 도구 사용법 |
| MEMORY.md | 5,000자 이내 | 프로젝트 핵심 기억 |
| TOOLS.md | 5,000자 이내 | 도구 매핑, 사용 패턴 |

합계: 약 23,000자. 150,000자 제한에 한참 여유가 있습니다.

**잘림을 방지하는 팁:**
- 장황한 서술 대신 불릿 포인트 사용
- 예시는 최소한으로 (1-2개면 충분)
- 히스토리성 내용은 memory/ 파일로 분리
- "절대 규칙"은 파일 상단에 배치 (잘려도 보존)

> **한 줄 요약**: 대화는 칠판, memory 파일은 노트, AGENTS.md는 교실 벽에 붙인 쪽지. 중요한 건 칠판에서 벽으로 승격시켜라.

## 1. 왜 멀티에이전트가 필요한가

### 문제 1: 컨텍스트 오버플로우

하나의 에이전트에 모든 규칙과 기억을 넣으면:

\`\`\`
AGENTS.md     (5,000 토큰)
MEMORY.md     (3,000 토큰)
TOOLS.md      (2,000 토큰)
memory/ 파일   (5,000 토큰)
대화 내용      (50,000+ 토큰)
─────────────────────────────
합계: 65,000+ 토큰 → 컨텍스트 윈도우의 상당 부분을 차지
\`\`\`

에이전트가 마케팅 전략도 짜고, 코드도 쓰고, 발주서도 만들면? 각 도메인의 규칙과 기억이 서로 경쟁하면서 품질이 떨어집니다.

### 문제 2: 규칙 충돌

\`\`\`markdown
# 콘텐츠 에이전트 규칙
- 톤: 친근하고 가벼운 유튜브 스타일
- 이모지 적극 활용

# 주문 관리 에이전트 규칙
- 톤: 정확하고 간결한 업무 스타일
- 이모지 사용 금지
\`\`\`

한 에이전트에 두 규칙이 공존하면? 발주서에 이모지가 들어가거나, 유튜브 스크립트가 딱딱해집니다.

### 문제 3: 전문성 희석

사람도 마찬가지입니다. 회계사에게 디자인을 시키면 안 됩니다. 에이전트도 **역할을 나누면 각 역할에서의 성능이 올라갑니다.**

## 2. 디렉토리 구조

멀티에이전트 시스템의 물리적 구조입니다.

\`\`\`
~/.openclaw/
├── workspace-strategy/          ← 전략봇의 작업 공간
│   ├── AGENTS.md               ← 전략봇 정체성
│   ├── MEMORY.md               ← 전략봇 기억
│   └── memory/                 ← 전략봇 일별 기록
│
├── workspace-research/          ← 리서치봇의 작업 공간
│   ├── AGENTS.md
│   ├── MEMORY.md
│   └── memory/
│
├── workspace-content/           ← 콘텐츠봇의 작업 공간
│   ├── AGENTS.md
│   ├── MEMORY.md
│   └── memory/
│
└── shared/team/                 ← 팀 공유 공간
    ├── TEAM.md                 ← 팀 전체 규칙
    └── COLLAB-RULES.md         ← 협업/위임 규칙
\`\`\`

### 핵심 원칙

- **각 에이전트는 자기만의 workspace를 가진다** — 기억과 규칙이 섞이지 않음
- **공유 정보는 shared/team/에 둔다** — 팀 전체가 알아야 할 것
- **다른 에이전트의 workspace에 직접 쓰지 않는다** — 통신 프로토콜을 통해서만

## 3. sessions_send — 에이전트 간 통신

\`sessions_send\`는 이미 실행 중인 에이전트에게 **메시지를 보내는** 함수입니다. 카카오톡을 보내는 것과 같습니다.

\`\`\`javascript
sessions_send({
  sessionKey: "agent:research:main",
  message: "리서치봇! 이번 주 AI 커머스 트렌드 정리해줘"
})
\`\`\`

### 사용 시나리오

\`\`\`
[전략봇] ────메시지────→ [리서치봇]
         "이번 주 트렌드 알려줘"

[리서치봇] ────메시지────→ [전략봇]
           "트렌드 3가지: 1)... 2)... 3)..."
\`\`\`

### 주요 파라미터

| 파라미터 | 설명 | 예시 |
|---------|------|------|
| \`sessionKey\` | 대상 에이전트의 세션 키 | \`"agent:research:main"\` |
| \`message\` | 전달할 메시지 | \`"AI 커머스 트렌드 정리해줘"\` |

### 언제 쓰는가?

- 다른 에이전트에게 **정보를 요청**할 때
- 작업 결과를 **보고**할 때
- 진행 상황을 **공유**할 때

---

## 4. sessions_spawn — 서브에이전트 생성

\`sessions_spawn\`은 새로운 에이전트를 **생성해서 작업을 위임**하는 함수입니다. 인턴을 고용하는 것과 같습니다.

\`\`\`javascript
sessions_spawn({
  task: "LMS 버튼 비활성화 기능 구현",
  label: "LMS 버튼",
  model: "sonnet",
  runTimeoutSeconds: 600
})
\`\`\`

### 주요 파라미터

| 파라미터 | 설명 | 예시 |
|---------|------|------|
| \`task\` | 위임할 작업 내용 | \`"LMS 버튼 비활성화 기능 구현"\` |
| \`label\` | 작업 식별 라벨 | \`"LMS 버튼"\` |
| \`model\` | 사용할 모델 | \`"sonnet"\` / \`"opus"\` |
| \`runTimeoutSeconds\` | 최대 실행 시간 (초) | \`600\` (10분) |

### 실행 흐름

\`\`\`
[메인 에이전트]
    │
    ├── spawn("데이터 수집") ──→ [서브에이전트 1] ──→ 결과 반환
    │
    ├── spawn("코드 작성") ──→ [서브에이전트 2] ──→ 결과 반환
    │
    └── spawn("테스트 실행") ──→ [서브에이전트 3] ──→ 결과 반환
    │
    ← 모든 결과 취합
\`\`\`

## 5. sessions_send vs sessions_spawn 차이

이 둘의 차이를 정확히 이해하는 것이 멀티에이전트의 핵심입니다.

| 구분 | sessions_send | sessions_spawn |
|------|--------------|----------------|
| 비유 | 동료에게 카톡 보내기 | 인턴 채용해서 일 시키기 |
| 대상 | 이미 존재하는 에이전트 | 새로 생성되는 에이전트 |
| 수명 | 대상이 계속 살아있음 | 작업 끝나면 소멸 |
| 기억 | 대상의 기억 유지됨 | 기억 없음 (경험 0) |
| 맥락 | 대상이 자기 맥락 보유 | 위임 메시지만 알고 있음 |
| 용도 | **통신** (정보 교환) | **위임** (작업 오프로드) |

### 선택 기준

\`\`\`
"이 에이전트가 이전 맥락을 알아야 하나?"
  → Yes → sessions_send (기존 에이전트에 메시지)
  → No  → sessions_spawn (새 에이전트에 위임)

"이 작업이 일회성인가?"
  → Yes → sessions_spawn
  → No  → sessions_send (지속적 협업)
\`\`\`

## 6. TEAM.md 구성

TEAM.md는 팀 전체의 **헌법**입니다. 모든 에이전트가 이 파일을 참조합니다.

\`\`\`markdown
# TEAM.md

## Mission Statement
AI싱크클럽 유튜브 채널의 AI + 커머스 콘텐츠 생태계를 구축하고,
주문 관리 시스템을 자동화하여 운영 효율을 극대화한다.

## Role Division

### 전략봇 (Strategy)
- 담당: 콘텐츠 방향 설정, 퍼널 전략, KPI 관리
- 세션키: agent:strategy:main
- 호명: "전략봇아"

### 리서치봇 (Research)
- 담당: 시장 조사, 트렌드 분석, 경쟁사 모니터링
- 세션키: agent:research:main
- 호명: "리서치봇아"

### 콘텐츠봇 (Content)
- 담당: 스크립트 작성, 썸네일 기획, SEO 최적화
- 세션키: agent:content:main
- 호명: "콘텐츠봇아"

### 주문봇 (Order)
- 담당: 발주서 생성, 송장 입력, 주문 데이터 처리
- 세션키: agent:order:main
- 호명: "주문봇아"

## Core Values
1. 정확성 우선 — 추측하지 말고 확인하라
2. 간결한 소통 — 필요한 것만 전달하라
3. 중복 금지 — 같은 정보를 두 번 보고하지 마라
4. 명시적 위임 — 암묵적 기대 금지, 항상 명확하게

## 7. 호명 규칙 (Invocation Rules)

여러 에이전트가 같은 대화 공간에 있을 때, **누가 응답해야 하는지** 결정하는 규칙입니다.

### 기본 규칙

\`\`\`
사용자: "전략봇아, 이번 주 콘텐츠 방향 잡아줘"
→ 전략봇이 응답

사용자: "리서치봇아, AI 커머스 시장 규모 알려줘"
→ 리서치봇이 응답

사용자: "이번 주 콘텐츠 방향 잡아줘"  (이름 없음)
→ NO_REPLY (아무도 응답 안 함) 또는 팀장 에이전트가 라우팅
\`\`\`

### 호명 규칙 설정 예시

\`\`\`markdown
<!-- 각 에이전트의 AGENTS.md에 추가 -->

## 호명 규칙
- 내 이름("전략봇" 또는 "전략봇아")이 호명되면 응답한다
- 내 이름이 없는 메시지에는 NO_REPLY
- 다른 에이전트 이름이 호명되면 절대 응답하지 않는다
- "전체" 또는 "모두"라고 하면 모든 에이전트가 응답한다
\`\`\`

### 왜 필요한가?

호명 규칙이 없으면 모든 에이전트가 동시에 응답하거나, 아무도 응답하지 않는 혼란이 생깁니다. 회의실에서 "누가 발표할 거예요?"라고 물었을 때 4명이 동시에 일어나는 상황을 방지합니다.

## 8. COLLAB-RULES.md — 위임 프레임워크

에이전트 간 작업을 위임할 때 반드시 포함해야 하는 **4가지 요소**입니다.

\`\`\`markdown
# COLLAB-RULES.md

## 위임 프레임워크

모든 위임은 다음 4요소를 반드시 포함해야 한다:

### 1. What — 구체적 산출물
"무엇을 만들어야 하는가?"
- 파일 형식, 분량, 포함 항목을 명시
- 모호한 표현 금지 ("좋은 거 만들어줘" X)

### 2. Why — 컨텍스트
"왜 이것이 필요한가?"
- 전체 프로젝트에서의 위치
- 이 산출물이 어디에 쓰이는지

### 3. Standard — 품질 기준
"어떤 기준을 충족해야 하는가?"
- 구체적 체크리스트
- 참고할 기존 사례나 템플릿

### 4. Deadline — 타임라인
"언제까지 필요한가?"
- 구체적 시점 또는 조건
- 중간 체크포인트 포함
\`\`\`

### 좋은 위임 예시

\`\`\`javascript
sessions_send({
  sessionKey: "agent:research:main",
  message: \`
    [What] 2026년 3월 셋째 주 AI 커머스 뉴스 요약 문서
           - 한국 3건, 글로벌 3건
           - 각 뉴스당 3줄 요약 + 출처 링크
           - markdown 형식으로 shared/research/weekly-2026-03-w3.md에 저장

    [Why] 이번 주 유튜브 콘텐츠 기획 회의 자료로 사용

    [Standard]
           - 출처가 불분명한 뉴스 제외
           - 수치가 포함된 뉴스 우선
           - 지난주 문서(weekly-2026-03-w2.md) 형식 참고

    [Deadline] 오늘 오후 3시까지
  \`
})
\`\`\`

### 나쁜 위임 예시

\`\`\`javascript
// 나쁜 예 1: What이 모호함
sessions_send({
  sessionKey: "agent:research:main",
  message: "이번 주 뉴스 좀 정리해줘"
})
// → 무슨 뉴스? 몇 건? 어떤 형식? 어디에 저장?

// 나쁜 예 2: Why가 없음
sessions_spawn({
  task: "competitor-analysis.xlsx 파일 만들어줘",
  label: "경쟁사 분석"
})
// → 왜 필요한지 모르니 초점이 흐려짐

// 나쁜 예 3: Standard가 없음
sessions_send({
  sessionKey: "agent:content:main",
  message: "유튜브 스크립트 써줘. 주제는 AI 상세페이지."
})
// → 분량은? 톤은? 참고 영상은? 대상 시청자는?
\`\`\`

## 10. sessions_spawn 서브에이전트의 한계

서브에이전트는 강력하지만, 명확한 한계가 있습니다. 이를 모르면 삽질합니다.

### 한계 1: 제한된 파일 접근

\`\`\`
서브에이전트가 읽을 수 있는 것:
  ✅ AGENTS.md
  ✅ TOOLS.md

서브에이전트가 읽을 수 없는 것:
  ❌ SOUL.md      (정체성 파일)
  ❌ IDENTITY.md  (정체성 파일)
  ❌ MEMORY.md    (기억 파일)
  ❌ memory/ 폴더  (일별 기록)
\`\`\`

> **의미**: 서브에이전트는 "도구 사용법"은 알지만, "나는 누구인가"와 "과거에 무슨 일이 있었는가"는 모릅니다. 순수한 실행자입니다.

### 한계 2: 기억 없음

\`\`\`
서브에이전트 = 경험 0의 신입 사원

- 이전 세션의 맥락을 모름
- 사용자의 선호를 모름
- 프로젝트 히스토리를 모름
- 오직 위임 메시지(task)에 적힌 것만 앎
\`\`\`

따라서 위임 메시지에 **필요한 모든 맥락을 포함**해야 합니다.

\`\`\`javascript
// 나쁜 예: 맥락 부족
sessions_spawn({
  task: "발주서 만들어줘",
  label: "발주서"
})
// → 어떤 형식? 어떤 데이터? 어디에 저장?

// 좋은 예: 맥락 충분
sessions_spawn({
  task: \`SD(웰빙농원) 발주서 생성.
    입력: /data/orderlist_260322.xlsx
    필터: 상품명에 [sd] 포함된 주문만
    출력: /data/260322_온더트랙_웰빙농원_발주서.xlsx
    형식: 받는분성명, 연락처, 우편번호, 받는분주소, 보내는이,
          보내는분전화번호, 보내는분주소, 품목명, 수량, 배송메세지
    품목명 변환: "[sd] 반건시 곶감 선물세트(황금보자기) (40-50g) 30과" → "반건시 40-50g 30과"
    수량 2+인 경우: 행 분리, 각 수량 1, 이름에 번호 부여 (홍길동, 홍길동 2, ...)
    스타일: 1행 주황 헤더, 열 너비 자동 조정\`,
  label: "SD 발주서",
  model: "sonnet",
  runTimeoutSeconds: 300
})
\`\`\`

### 한계 3: 동시 실행 제한

\`\`\`
서브에이전트 동시 실행: 최대 5개
전체 에이전트 세션:     최대 8개

예시:
  메인 에이전트     ×1
  상시 에이전트들    ×2 (리서치봇, 콘텐츠봇)
  서브에이전트들     ×5 (최대)
  ─────────────────
  합계:             8개
\`\`\`

> **팁**: 서브에이전트 5개를 동시에 돌리면 비용도 5배입니다. 꼭 병렬이어야 하는지 판단하세요.

## 11. 좋은 위임 vs 나쁜 위임

### Good: 서브에이전트에 적합한 작업

| 작업 유형 | 이유 |
|----------|------|
| 명확한 스펙의 코딩 | 입출력이 정의되어 있으면 맥락 불필요 |
| 데이터 조회/정리 | 기계적 작업, 판단 최소 |
| 파일 형식 변환 | 규칙 기반, 창의성 불필요 |
| 테스트 실행 | 통과/실패가 명확 |
| 정형화된 문서 생성 | 템플릿이 있으면 OK |

### Bad: 서브에이전트에 부적합한 작업

| 작업 유형 | 이유 |
|----------|------|
| 디자인 감각이 필요한 작업 | 서브에이전트는 미적 판단 못함 |
| 톤앤매너 결정 | 사용자 선호를 모름 (MEMORY.md 못 읽음) |
| 전략적 판단 | 프로젝트 전체 맥락 없음 |
| 사용자와의 직접 소통 | 사용자 히스토리 없음 |
| GUI 자동화 | **절대 금지** (아래 참고) |

## 12. 위임 지시문 작성 Best Practice

### 나쁜 예

\`\`\`javascript
sessions_spawn({
  task: "유튜브 스크립트 써줘",
  label: "스크립트"
})
\`\`\`

문제점:
- 주제가 없음
- 분량이 없음
- 톤이 없음
- 타겟 시청자가 없음
- 참고 자료가 없음

### 좋은 예

\`\`\`javascript
sessions_spawn({
  task: \`유튜브 스크립트 작성.

    [주제] "AI로 상세페이지 제작 시간 8시간→10분으로 줄인 방법"
    [형식] Before/After 실전 시연형
    [분량] 12-15분 분량 (약 3,000자)
    [구조]
      1. 훅 (30초): 충격적 수치로 시작
      2. 문제 제기 (2분): 기존 상세페이지 제작의 고통
      3. 솔루션 (7분): 드랩 활용 실전 과정
      4. 결과 비교 (2분): Before vs After
      5. CTA (1분): 무료 체크리스트 다운로드 유도
    [톤] 전문적이지만 친근한 형/누나 톤
    [금지] 과장된 수치, 근거 없는 주장
    [참고] shared/research/ai-tools-review.md의 드랩 섹션
    [출력] shared/content/scripts/20260322-detail-page.md\`,
  label: "상세페이지 스크립트",
  model: "sonnet",
  runTimeoutSeconds: 600
})

## 13. 에이전트 분리의 3가지 이점

### 이점 1: 컨텍스트 효율

\`\`\`
[단일 에이전트]
전략 규칙 + 리서치 규칙 + 콘텐츠 규칙 + 주문 규칙 = 15,000 토큰
→ 매 요청마다 15,000 토큰 소비 (대부분 불필요)

[분리된 에이전트]
전략봇: 전략 규칙만 = 3,000 토큰
리서치봇: 리서치 규칙만 = 4,000 토큰
→ 각 요청에서 필요한 규칙만 로딩
\`\`\`

### 이점 2: 규칙 순도

\`\`\`
[단일 에이전트]
"톤은 친근하게" + "톤은 정확하게" = 모순 → 혼란

[분리된 에이전트]
콘텐츠봇: "톤은 친근하게" → 일관된 콘텐츠
주문봇: "톤은 정확하게" → 정확한 발주서
\`\`\`

### 이점 3: 병렬 처리

\`\`\`
[단일 에이전트]
리서치 → 완료 → 스크립트 작성 → 완료 → 발주서 처리
총 시간: 30분

[분리된 에이전트]
리서치봇: 리서치 ──────────→ 완료
콘텐츠봇: 스크립트 작성 ────→ 완료     (동시 진행!)
주문봇:   발주서 처리 ──────→ 완료     (동시 진행!)
총 시간: 10분

## 14. 안티패턴

### 안티패턴 1: 정보 중복 보고

\`\`\`
❌ 리서치봇이 같은 내용을 3개 에이전트에 각각 보고
   → 토큰 낭비, 정보 불일치 위험

✅ 공유 파일에 한 번 기록, 필요한 에이전트에 경로만 전달
\`\`\`

### 안티패턴 2: 체인 위임 (떠넘기기)

\`\`\`
❌ 전략봇 → 리서치봇에 위임 → 리서치봇이 서브에이전트에 재위임
   → 맥락 손실, 추적 불가

✅ 위임은 1단계만. 서브에이전트가 다시 위임하지 않는다.
\`\`\`

\`\`\`

   → 누가 최종 결정권자인지 불분명

✅ TEAM.md에 명확히:
   - 전략봇: 콘텐츠 방향 "결정"
   - 콘텐츠봇: 결정된 방향에 따라 "실행"
\`\`\`

### 안티패턴 4: 서브에이전트에 과도한 자율권

\`\`\`
❌ sessions_spawn({ task: "알아서 잘 해줘" })
   → 결과물 품질 보장 불가

✅ sessions_spawn({ task: "구체적 스펙 + 품질 기준 + 출력 형식" })

## 15. 금지 규칙: GUI 자동화는 서브에이전트에 위임 금지

이것은 **절대 규칙**입니다.

\`\`\`
❌ sessions_spawn({
     task: "브라우저 열어서 네이버 쇼핑 트렌드 캡처해줘"
   })
\`\`\`

**이유:**
- 서브에이전트는 GUI 접근 권한이 제한적
- 화면 상태를 인식하고 판단하는 데 맥락이 필요
- 예상치 못한 팝업, 로딩 지연 등을 처리할 수 없음
- GUI 자동화는 **메인 에이전트 또는 전용 에이전트**가 직접 수행

\`\`\`
✅ GUI 자동화가 필요하면:
   1. 메인 에이전트가 직접 수행하거나
   2. GUI 전용 상시 에이전트(sessions_send 대상)에 요청

## 심화: sessions_spawn 프로덕션 패턴

프로덕션 환경에서 서브에이전트를 안전하게 운용하기 위한 설정과 패턴들입니다.

### 서브에이전트 제한 설정

\`\`\`json5
// openclaw.json에서 서브에이전트 제한
agents: {
  list: [{
    id: "main",
    subagents: { allowAgents: ["main"] }  // 자기 자신만 spawn 가능
  }]
}
\`\`\`

\`allowAgents\`에 명시된 에이전트 ID만 \`sessions_spawn\`을 호출할 수 있습니다. 이 설정이 없으면 모든 에이전트가 서브에이전트를 생성할 수 있어, 체인 위임(떠넘기기)이 발생할 위험이 있습니다.

### 세션 키 명명 규칙

세션 키는 에이전트의 **주소**입니다. 일관된 명명 규칙으로 세션을 추적할 수 있습니다.

| 패턴 | 형식 | 용도 |
|------|------|------|
| 서브에이전트 | \`agent:<agentId>:subagent:<uuid>\` | \`sessions_spawn\`으로 생성된 일회성 에이전트 |
| 크론잡 | \`cron:<job.id>\` | 정시 실행되는 크론 세션 |
| 웹훅 | \`hook:<uuid>\` | 외부 이벤트로 트리거된 세션 |
| 멀티에이전트 파이프라인 | \`pipeline:<project>:<role>\` | 멀티에이전트 파이프라인의 역할별 세션 |

\`\`\`
예시:
  agent:order:subagent:a1b2c3d4     → 주문봇이 생성한 서브에이전트
  cron:morning-briefing              → 아침 브리핑 크론잡
  hook:e5f6g7h8                      → 웹훅으로 트리거된 세션
  pipeline:youtube:researcher        → 유튜브 파이프라인의 리서치 역할
\`\`\`

### REPLY_SKIP, ANNOUNCE_SKIP: 루프 억제

서브에이전트가 결과를 반환할 때, 메인 에이전트가 다시 응답하고, 그 응답에 서브에이전트가 또 반응하는 **무한 루프**가 발생할 수 있습니다.

\`\`\`
[무한 루프 시나리오]
메인 → 서브: "데이터 수집해줘"
서브 → 메인: "수집 완료"
메인 → 서브: "감사합니다" (불필요한 응답)
서브 → 메인: "천만에요" (불필요한 응답)
... (영원히 반복)
\`\`\`

\`REPLY_SKIP\`과 \`ANNOUNCE_SKIP\`은 이 루프를 억제합니다:
- **REPLY_SKIP**: 서브에이전트의 결과를 받았을 때 자동 응답을 생성하지 않음
- **ANNOUNCE_SKIP**: 서브에이전트 생성/종료 알림을 채널에 표시하지 않음

### 동기 sessions_send

기본적으로 \`sessions_send\`는 비동기(fire-and-forget)입니다. 응답을 기다려야 할 때는 \`timeoutSeconds\`를 설정합니다.

\`\`\`javascript
// 비동기 (응답 안 기다림)
sessions_send({ sessionKey: "agent:research:main", message: "트렌드 조사해줘" })

// 동기 (응답 대기, 최대 5턴 ping-pong)
sessions_send({
  sessionKey: "agent:research:main",
  message: "트렌드 조사해줘",
  timeoutSeconds: 120  // 0보다 크면 동기 모드
})
\`\`\`

동기 모드에서는 최대 **5턴의 ping-pong**이 가능합니다. 5턴을 초과하면 자동으로 대화가 종료됩니다. 이는 에이전트 간 무한 대화를 방지하기 위한 안전장치입니다.

## 심화: 에이전트 간 통신 활성화

에이전트 간 통신(Agent-to-Agent)은 기본적으로 **비활성화**되어 있습니다. 명시적으로 활성화해야 합니다.

\`\`\`json5
tools: {
  agentToAgent: {
    enabled: true,       // 마스터 스위치 — 필수
    allow: ["main", "external"]  // 허용할 에이전트 ID
  }
}
\`\`\`

### 설정 필드

| 필드 | 기본값 | 설명 |
|------|--------|------|
| \`enabled\` | \`false\` | 마스터 스위치. \`true\`로 설정하지 않으면 모든 에이전트 간 통신이 차단됨 |
| \`allow\` | \`[]\` | 통신을 허용할 에이전트 ID 목록. 이 목록에 없는 에이전트는 메시지를 보내거나 받을 수 없음 |

### 왜 기본값이 false인가?

보안과 비용 때문입니다:
- 에이전트가 의도치 않게 다른 에이전트를 호출하여 **비용 폭발**이 발생할 수 있음
- 악성 프롬프트가 에이전트 간 전파될 수 있음
- 디버깅이 어려운 **연쇄 반응**이 발생할 수 있음

### 안티패턴: wildcard 허용

\`\`\`json5
// 절대 하지 마세요
tools: {
  agentToAgent: {
    enabled: true,
    allow: ["*"]   // 모든 에이전트에 통신 허용 → 위험!
  }
}
\`\`\`

\`allow: ["*"]\`는 모든 에이전트가 모든 에이전트와 통신할 수 있게 열어둡니다. 이렇게 하면:
- 어떤 에이전트가 어떤 에이전트와 통신하는지 추적 불가
- 의도치 않은 에이전트 호출로 비용 폭발
- 보안 경계가 사실상 무의미

항상 **필요한 에이전트 ID만 명시적으로** 나열하세요.

## 심화: 결정론적 워크플로우 vs LLM 라우팅

멀티에이전트 시스템에서 가장 흔한 실수는 **LLM에게 라우팅을 맡기는 것**입니다.

### 핵심 원칙

> "Don't orchestrate with LLMs. Use them for creative work, use code for plumbing."
>
> (LLM으로 오케스트레이션하지 마라. LLM은 창의적 작업에, 코드는 배관 작업에 사용하라.)

### LLM 라우팅의 문제

\`\`\`
[LLM 라우팅]
사용자 메시지 → LLM이 읽고 판단 → "이건 리서치봇 일이다" → 라우팅

문제:
1. 비결정적 — 같은 메시지에 다른 판단을 내릴 수 있음
2. 느림 — 라우팅 판단에 2-5초 소요
3. 비용 — 라우팅 판단만으로 입출력 토큰 소비
4. 디버깅 불가 — "왜 리서치봇으로 보냈지?"의 이유를 추적할 수 없음
\`\`\`

### 결정론적 워크플로우 엔진

해결책은 **코드로 라우팅**하는 것입니다. Lobster 같은 결정론적 워크플로우 엔진을 사용하면:

\`\`\`
[결정론적 라우팅]
사용자 메시지 → 키워드/패턴 매칭 (코드) → 확정된 에이전트로 라우팅

장점:
1. 결정론적 — 같은 입력이면 항상 같은 결과
2. 빠름 — 밀리초 단위 판단
3. 무비용 — LLM 호출 없음
4. 추적 가능 — 라우팅 로직이 코드에 명시됨
\`\`\`

### 실전 설계 패턴

\`\`\`
┌─────────────────────────────────────────────┐
│           결정론적 파이프라인 컨트롤러          │
│                                               │
│  if (message.contains("[sd]")) → 주문봇       │
│  if (schedule == "09:00") → 브리핑 생성        │
│  if (channel == "#research") → 리서치봇       │
│  else → 전략봇 (기본 라우터)                   │
│                                               │
│  ↓ 라우팅 후                                   │
│                                               │
│  각 에이전트 내부에서 LLM이 "생각"             │
│  (맥락 판단, 문서 생성, 코드 작성 등)          │
└─────────────────────────────────────────────┘
\`\`\`

LLM은 **"생각이 필요한 단계"**에만 사용합니다:
- 문서 내용 분석 및 요약
- 자연어 응답 생성
- 코드 작성 및 리뷰
- 맥락 기반 판단

LLM을 사용하지 않는 단계:
- 메시지 라우팅
- 파일 이동/복사
- API 호출 (정해진 엔드포인트)
- 스케줄 관리
- 데이터 형식 변환 (정형화된 규칙)

이 원칙을 지키면 비용이 크게 줄고, 시스템 동작이 예측 가능해지며, 디버깅이 쉬워집니다.

> **한 줄 요약**: 에이전트를 나누면 각자의 전문성이 올라가고, 통신과 위임 규칙으로 팀워크를 만든다. 단, 서브에이전트는 "기억 없는 인턴"이라는 걸 잊지 마라.
` },
